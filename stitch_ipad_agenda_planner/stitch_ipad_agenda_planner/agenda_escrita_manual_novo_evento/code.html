<script>
        // Micro-interactions for category selection - enhanced for pen usage
        const categoryButtons = document.querySelectorAll('button[type="button"].rounded-full:not(.p-2)');
        categoryButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                categoryButtons.forEach(b => {
                    b.innerHTML = '';
                    b.classList.remove('ring-2', 'ring-offset-4', 'w-12', 'h-12');
                    b.classList.add('w-10', 'h-10');
                });
                btn.classList.add('ring-2', 'ring-offset-4', 'w-12', 'h-12');
                btn.classList.remove('w-10', 'h-10');
                btn.innerHTML = '<span class="material-symbols-outlined text-white" style="font-variation-settings: \'FILL\' 1;">check</span>';
                
                // Determine ring color based on button bg
                if (btn.classList.contains('bg-primary')) btn.classList.add('ring-primary');
                if (btn.classList.contains('bg-tertiary')) btn.classList.add('ring-tertiary');
                if (btn.classList.contains('bg-error')) btn.classList.add('ring-error');
                if (btn.classList.contains('bg-secondary')) btn.classList.add('ring-secondary');
            });
        });

        // Simple form validation micro-interaction
        const form = document.getElementById('event-form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const titleInput = document.getElementById('title');
            if(!titleInput.value) {
                titleInput.parentElement.classList.replace('border-outline-variant/40', 'border-error');
                titleInput.focus();
                return;
            }
            
            // Success State Logic
            const saveBtn = e.target.querySelector('button[type="submit"]');
            saveBtn.innerHTML = '<span class="material-symbols-outlined animate-spin mr-2">progress_activity</span> Processing Ink...';
            saveBtn.disabled = true;
            
            setTimeout(() => {
                saveBtn.innerHTML = 'Saved';
                saveBtn.classList.replace('bg-primary', 'bg-green-600');
                setTimeout(() => {
                    alert('Event processed and saved to your calendar!');
                    window.location.reload();
                }, 800);
            }, 1500);
        });
    </script>
