<style>
* { box-sizing:border-box; }
body { margin:0; font-family:'Inter',sans-serif; background:#f5f5f7; -webkit-user-select:none; user-select:none; }
.material-symbols-outlined { font-variation-settings:'FILL'0,'wght'400,'GRAD'0,'opsz'24; vertical-align:middle; }
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex:1;padding:3px 6px 6px;overflow-y:auto}
.cel{background:#fff;padding:3px 4px;cursor:pointer;border-radius:3px;overflow:hidden;position:relative;display:flex;flex-direction:column}
.cel:hover{background:#f8f8fa}
.cel.today{background:#fdf2f8}
.cel.other{opacity:0.3}
.cel-num{font-size:11px;font-weight:600;flex-shrink:0}
.cel-num.today{color:#b7006f}
.cel-img{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:1px}
.cel-img img{max-height:100%;max-width:100%;border-radius:2px;object-fit:contain}
.day-header{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#fff;border-bottom:1px solid #eee}
.day-b {display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:transparent;border:none;cursor:pointer;font-size:13px;font-weight:500;color:#666;border-radius:6px;transition:background.15s}
.day-b:hover{background:#eee}
.psec{margin-bottom:16px}
.ph{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-radius:6px;margin-bottom:4px}
.ph.m{background:#fdf2f8;color:#b7006f}
.ph.t{background:#fff7ed;color:#e67e22}
.ph.n{background:#eff6ff;color:#3b82f6}
.ph-c{font-size:13px;font-weight:700}
.trow{display:flex;align-items:center;gap:8px;padding:4px 12px;min-height:38px;border-bottom:1px solid #f3f3f5}
.trow:last-child{border-bottom:none}
.trow.done{opacity:0.5}
.trow.failed{opacity:0.6}
.sc{width:22px;height:22px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid #ccc;cursor:pointer;transition:all.2s}
.sc.pending{border-color:#ccc;color:transparent}
.sc.done{background:#22c55e;border-color:#22c55e;color:#fff}
.sc.failed{background:#ef4444;border-color:#ef4444;color:#fff}
.timg{max-height:40px;width:auto;border-radius:3px}
.hpad{touch-action:none;cursor:crosshair;display:block;border-radius:6px;width:100%}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1b1c1d;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity.3s;pointer-events:none}
#toast.show{opacity:1}
</style>

const S='https://pftjojkgzgthayfabhhf.supabase.co',A='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdGpvamtnemd0aGF5ZmFiaGhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDE5MjcsImV4cCI6MjA5NjYxNzkyN30.CfqAZjKmiDexilbRMMRWl54-UZPVGz9Abu3tXpaQ0y4'

function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function fd(d){const m=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'],w=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado'];return w[d.getDay()]+', '+d.getDate()+' de '+m[d.getMonth()]}

// Handwriting Pad
class HP{
  constructor(cn,op={}){
    this.c=cn;this.h=op.h||100;this._d=false;this.dpr=window.devicePixelRatio||1;this._lw=op.lw||2.5;this._er=false;this.ES=18
    this.wr=document.createElement('div');this.wr.style.cssText='position:relative;width:100%;background:#fcfdff;border-radius:6px;overflow:hidden'
    if(op.tb!==false){this.tb=document.createElement('div');this.tb.style.cssText='display:flex;gap:3px;padding:3px 6px;border-bottom:1px solid #eee;background:#fafafa;align-items:center'
    this._pb=this._tb('edit','Caneta',true);this._eb=this._tb('auto_fix_high','Borracha',false);this.tb.appendChild(this._pb);this.tb.appendChild(this._eb)
    this._pb.onclick=()=>this.sm('pen');this._eb.onclick=()=>this.sm('eraser')
    const sp=document.createElement('div');sp.style.cssText='flex:1';this.tb.appendChild(sp)
    this._cl=this._tb('delete','Limpar',false);this._cl.onclick=()=>{if(this._d){this.clear();this._ch()}};this.tb.appendChild(this._cl);this.wr.appendChild(this.tb)}
    this.cw=document.createElement('div');this.cw.style.cssText=`width:100%;height:${this.h}px;position:relative`
    this.ca=document.createElement('canvas');this.ca.className='hpad';this.ctx=this.ca.getContext('2d')
    this._rs();this._dbg();this.cw.appendChild(this.ca);this.wr.appendChild(this.cw);cn.appendChild(this.wr)
    this._dr=false;this.ca.addEventListener('pointerdown',e=>this._s(e));this.ca.addEventListener('pointermove',e=>this._m(e))
    this.ca.addEventListener('pointerup',e=>this._e(e));this.ca.addEventListener('pointerleave',e=>this._e(e));this.ca.addEventListener('pointercancel',e=>this._e(e));this.ca.style.touchAction='none'
  }
  _tb(ic,lb,ac){const b=document.createElement('button');b.type='button';b.innerHTML='<span class="material-symbols-outlined" style="font-size:16px">'+ic+'</span>';b.style.cssText=`display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:5px;border:none;cursor:pointer;background:${ac?'#b7006f':'transparent'};color:${ac?'#fff':'#666'};transition:all.15s`;b.title=lb;return b}
  sm(m){this._er=m==='eraser';this._pb.style.background=this._er?'transparent':'#b7006f';this._pb.style.color=this._er?'#666':'#fff';this._eb.style.background=this._er?'#b7006f':'transparent';this._eb.style.color=this._er?'#fff':'#666';this.ca.style.cursor=this._er?'cell':'crosshair'}
  _rs(){const r=this.c.getBoundingClientRect();const w=r.width||600;this.ca.width=w*this.dpr;this.ca.height=this.h*this.dpr;this.ca.style.height=this.h+'px';this.ca.style.width=w+'px';this.w=w}
  _dbg(){const c=this.ctx;c.fillStyle='#fcfdff';c.fillRect(0,0,this.ca.width,this.ca.height);c.strokeStyle='#e2e7ff';c.lineWidth=1;for(let y=16*this.dpr;y<this.ca.height;y+=16*this.dpr){c.beginPath();c.moveTo(0,y+.5);c.lineTo(this.ca.width,y+.5);c.stroke()}}
  _s(e){e.preventDefault();this._dr=true;this._d=true;const x=e.offsetX*this.dpr,y=e.offsetY*this.dpr;const c=this.ctx;c.beginPath();c.moveTo(x,y)
  if(this._er){c.strokeStyle='#fcfdff';c.lineWidth=this.ES*this.dpr}else{c.strokeStyle='#1b1c1d';c.lineWidth=this._lw*this.dpr}
  c.lineCap='round';c.lineJoin='round';this._lx=x;this._ly=y}
  _m(e){if(!this._dr)return;e.preventDefault();const x=e.offsetX*this.dpr,y=e.offsetY*this.dpr;const c=this.ctx;c.beginPath();c.moveTo(this._lx,this._ly);c.lineTo(x,y)
  if(this._er){c.strokeStyle='#fcfdff';c.lineWidth=this.ES*this.dpr}else{c.strokeStyle='#1b1c1d';c.lineWidth=this._lw*this.dpr}
  c.lineCap='round';c.lineJoin='round';c.stroke();this._lx=x;this._ly=y}
  _e(e){if(!this._dr)return;this._dr=false}
  toD(mw){if(!this._d)return'';mw=mw||600;const w=this.ca.width,h=this.ca.height;if(w<=mw*this.dpr)return this.ca.toDataURL('image/png')
  const s=(mw*this.dpr)/w,tw=Math.round(w*s),th=Math.round(h*s),tc=document.createElement('canvas');tc.width=tw;tc.height=th;tc.getContext('2d').drawImage(this.ca,0,0,tw,th);return tc.toDataURL('image/png')}
  clear(){this._d=false;this._dbg()}
  load(d){if(!d)return;this._d=true;const i=new Image();i.onload=()=>{this.ctx.drawImage(i,0,0,this.ca.width,this.ca.height)};i.src=d}
  _ch(){}isEmpty(){return!this._d}
}

// Load data
async function loadAll(){
  if(!uid)return
  const[t,ce]=await Promise.all([sb.from('tasks').select('*').eq('user_id',uid).order('task_date'),sb.from('commitments').select('*').eq('user_id',uid)])
  if(!t.error&&t.data)alT=t.data;else alT=[]
  if(!ce.error&&ce.data){alC={};ce.data.forEach(c=>{alC[c.commit_date]=c.drawing})}
  // Today's tasks
  const h=new Date(),hs=ds(h);tp={manha:[],tarde:[],noite:[]}
  alT.filter(t=>t.task_date===hs).forEach(t=>{if(tp[t.period])tp[t.period].push(t)})
}

// Calendar
function renderCal(){
  const m=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  $('cal-t').textContent=m[cm]+' '+cy
  const fi=new Date(cy,cm,1).getDay(),da=new Date(cy,cm+1,0).getDate(),pd=new Date(cy,cm,0).getDate(),ho=new Date()
  let h=''
  for(let d=pd-fi+1;d<=pd;d++)h+='<div class="cel other"><div class="cel-num">'+d+'</div></div>'
  for(let d=1;d<=da;d++){
    const eh=d===ho.getDate()&&cm===ho.getMonth()&&cy===ho.getFullYear(),sd=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')
    const co=alC[sd]||''
    h+='<div class="cel '+(eh?'today':'')+'" data-d="'+sd+'"><div class="cel-num '+(eh?'today':'')+'">'+d+'</div><div class="cel-img">'+(co?'<img src="'+co+'" draggable="false">':'')+'</div></div>'
  }
  const to=fi+da,re=to%7===0?0:7-(to%7)
  for(let i=1;i<=re;i++)h+='<div class="cel other"><div class="cel-num">'+i+'</div></div>'
  $('cal-g').innerHTML=h
  // Square cells
  const cw=Math.floor($('cal-g').querySelector('.cel').offsetWidth)
  if(cw>60)$('cal-g').querySelectorAll('.cel').forEach(el=>{el.style.height=cw+'px'})
  // Click
  $('cal-g').querySelectorAll('.cel').forEach(el=>{el.addEventListener('click',()=>{slD=el.dataset.d;showDay(slD)})})
}

// Today panel
function renderToday(){
  const c=$('today-t')
  if(!c)return
  const h=new Date(),hs=ds(h),we=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado']
  $('today-d').textContent=we[h.getDay()]+', '+h.getDate()+'/'+(h.getMonth()+1)
  const all=[...tp.manha,...tp.tarde,...tp.noite]
  if(all.length===0){c.innerHTML='<div style="text-align:center;padding:12px;color:#999;font-size:12px">Nenhuma tarefa hoje</div>';return}
  c.innerHTML=''
  for(const p of['manha','tarde','noite']){
    const li=tp[p]
    if(li.length===0)continue
    const d=document.createElement('div')
    d.style.cssText='margin-bottom:6px'
    d.innerHTML='<div style="font-size:11px;font-weight:700;color:'+PC[p]+';padding:0 4px;margin-bottom:2px">'+PI[p]+' '+PL[p]+'</div>'
    li.forEach(t=>{
      const r=document.createElement('div');r.className='trow '+(t.status);r.style.cssText='cursor:default;padding:3px 6px;min-height:30px;border-radius:3px'
      r.innerHTML='<div class="sc '+t.status+'" style="width:18px;height:18px;font-size:10px;border-width:1.5px">'+SI[t.status]+'</div>'+(t.drawing?'<img class="timg" src="'+t.drawing+'" style="max-height:20px">':'<span style="font-size:11px;color:#333">'+((t.title)||'')+'</span>')
      r.querySelector('.sc').addEventListener('click',async e=>{e.stopPropagation();const ta=alT.find(x=>x.id===t.id);if(!ta)return;const ne=SN[ta.status];await sb.from('tasks').update({status:ne}).eq('id',t.id);await loadAll();renderCal();renderToday()})
      d.appendChild(r)
    })
    c.appendChild(d)
  }
}

// Day view
let _cPad=null,_cInit=false
function showDay(date){
  slD=date
  $('v-cal').style.display='none';$('v-dia').style.display='flex'
  $('day-t').textContent=fd(new Date(date.split('-')[0],+date.split('-')[1]-1,+date.split('-')[2]))
  loadDayTasks(date)
}
function backCal(){$('v-dia').style.display='none';$('v-cal').style.display='flex';loadAll().then(()=>{renderCal();renderToday()})}
async function loadDayTasks(date){
  if(!uid)return
  const{data,error}=await sb.from('tasks').select('*').eq('user_id',uid).eq('task_date',date).order('created_at')
  const tasks=error||!data?[]:data
  for(const p of['manha','tarde','noite']){
    const cn=$('tsk-'+p),li=tasks.filter(t=>t.period===p)
    if(li.length===0){cn.innerHTML='<div class="empty" style="text-align:center;padding:8px;color:#999;font-size:12px">Nenhuma tarefa</div>'}else{
      cn.innerHTML=li.map(t=>'<div class="trow '+(t.status)+'" data-id="'+t.id+'"><div class="sc '+t.status+'" data-id="'+t.id+'">'+SI[t.status]+'</div><div style="flex:1;min-width:0">'+(t.drawing?'<img class="timg" src="'+t.drawing+'" draggable="false" style="max-height:36px">':'<span style="font-size:13px;color:#333">'+((t.title)||'')+'</span>')+'</div><div style="display:flex;gap:3px;flex-shrink:0"><button class="edt" data-id="'+t.id+'" style="background:none;border:none;cursor:pointer;color:#666;padding:3px;font-size:13px" title="Editar">\u270F\uFE0F</button><button class="dlt" data-id="'+t.id+'" style="background:none;border:none;cursor:pointer;color:#ba1a1a;padding:3px;font-size:13px" title="Excluir">\uD83D\uDDD1\uFE0F</button></div></div>').join('')
    }
    // Status
    cn.querySelectorAll('.sc').forEach(el=>{el.addEventListener('click',async e=>{e.stopPropagation();const ta=tasks.find(x=>x.id===el.dataset.id);if(!ta)return;await sb.from('tasks').update({status:SN[ta.status]}).eq('id',el.dataset.id);await loadDayTasks(date)})})
    // Edit
    cn.querySelectorAll('.edt').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();editT(el.dataset.id,date)})})
    // Delete
    cn.querySelectorAll('.dlt').forEach(el=>{el.addEventListener('click',e=>{e.stopPropagation();delT(el.dataset.id,date)})})
  }
  // Commitment
  loadCommit()
}

// Add task inline
function addT(period){
  const cn=$('tsk-'+period)
  if(cn.querySelector('.ip'))return
  const w=document.createElement('div');w.className='ip';w.style.cssText='border:1px solid #d0d0d2;border-radius:6px;margin:4px 0;padding:4px;background:#fff'
  const pd=document.createElement('div');pd.style.cssText='height:140px;width:100%';w.appendChild(pd)
  const ac=document.createElement('div');ac.style.cssText='display:flex;gap:4px;justify-content:flex-end;margin-top:4px'
  ac.innerHTML='<button class="ipc" style="padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;color:#666;background:#f0f0f2">Cancelar</button><button class="ips" style="padding:5px 16px;background:#b7006f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">Salvar</button>'
  w.appendChild(ac)
  const em=cn.querySelector('.empty');if(em)cn.innerHTML=''
  cn.prepend(w)
  const pad=new HP(pd,{h:140,toolbar:false})
  w.querySelector('.ipc').onclick=()=>w.remove()
  w.querySelector('.ips').onclick=async()=>{const dr=pad.toD();if(!dr){to('Escreva algo');return};await sb.from('tasks').insert({user_id:uid,task_date:slD,period,drawing:dr,title:'',status:'pending'});to('Tarefa adicionada!');w.remove();await loadDayTasks(slD)}
}

// Edit task
async function editT(id,date){
  const ta=alT.find(t=>t.id===id);if(!ta)return
  const cn=$('tsk-'+ta.period);if(cn.querySelector('.ip'))return
  const w=document.createElement('div');w.className='ip';w.style.cssText='border:1px solid #b7006f;border-radius:6px;margin:4px 0;padding:4px;background:#fff'
  const pd=document.createElement('div');pd.style.cssText='height:140px;width:100%';w.appendChild(pd)
  const ac=document.createElement('div');ac.style.cssText='display:flex;gap:4px;justify-content:flex-end;margin-top:4px'
  ac.innerHTML='<button class="ipc" style="padding:5px 12px;border:none;border-radius:4px;cursor:pointer;font-size:12px;color:#666;background:#f0f0f2">Cancelar</button><button class="ips" style="padding:5px 16px;background:#b7006f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600">Salvar</button>'
  w.appendChild(ac)
  cn.prepend(w)
  const pad=new HP(pd,{h:140,toolbar:false})
  if(ta.drawing)pad.load(ta.drawing)
  w.querySelector('.ipc').onclick=()=>w.remove()
  w.querySelector('.ips').onclick=async()=>{const dr=pad.toD();if(!dr){to('Escreva algo');return};await sb.from('tasks').update({drawing:dr}).eq('id',id);to('Tarefa atualizada!');w.remove();await loadDayTasks(date)}
}
async function delT(id,date){if(!confirm('Excluir tarefa?'))return;await sb.from('tasks').delete().eq('id',id);to('Excluida');await loadDayTasks(date)}

// Commitment
async function loadCommit(){
  if(!$('c-pad'))return
  _cInit=true
  if(_cPad){_cPad.wr.remove();_cPad=null}
  _cPad=new HP($('c-pad'),{h:160,toolbar:true})
  if(alC[slD])_cPad.load(alC[slD])
  $('c-save').onclick=async()=>{const dr=_cPad.toD();if(!dr){to('Escreva o compromisso');return};await sb.from('commitments').upsert({user_id:uid,commit_date:slD,drawing:dr},{onConflict:'commit_date'});to('Compromisso salvo!');_cPad.clear();await loadAll();renderCal();renderToday();loadCommit()}
  $('c-clr').onclick=async()=>{_cPad.clear();await sb.from('commitments').delete().eq('user_id',uid).eq('commit_date',slD);delete alC[slD];renderCal();to('Compromisso removido')}
}

    // Day view
    +'<div id="v-dia" style="flex:1;display:none;flex-direction:column;overflow:hidden">'
    +'<div style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid #eee;background:#fafafa">'
    +'<button id="b2c" class="day-b"><span class="material-symbols-outlined" style="font-size:18px">arrow_back</span> Voltar</button>'
    +'<span id="day-t" style="font-size:15px;font-weight:600;color:#1b1c1d"></span></div>'
    +'<div style="flex:1;overflow-y:auto;padding:6px 10px;max-width:1450px;margin:0 auto;width:100%">'
    +['manha','tarde','noite'].map(p=>'<div class="psec"><div class="ph '+p+'"><span class="ph-c">'+PI[p]+' '+PL[p]+'</span><button class="add-'+p+'" style="padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;color:'+PC[p]+';background:rgba(255,255,255,0.7)">+ Escrever</button></div><div id="tsk-'+p+'"><div style="text-align:center;padding:8px;color:#999;font-size:12px">Nenhuma tarefa</div></div></div>').join('')+''
    // Commitment
    +'<div style="border-top:1px solid #eee;margin-top:8px;padding:8px 0 12px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:#1b1c1d">📌 Compromisso</span><button id="c-clr" class="day-b" style="font-size:11px;color:#999">Limpar</button></div>'
    +'<div id="c-pad" style="width:100%;max-width:1406px;min-height:160px;margin:0 auto 6px"></div>'
    +'<div style="display:flex;justify-content:flex-end"><button id="c-save" style="padding:6px 20px;background:#b7006f;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Salvar Compromisso</button></div></div></div></div>'
    +'<div id="toast"></div></div>'

  $('pm').onclick=()=>{cm--;if(cm<0){cm=11;cy--}renderCal()}
  $('nm').onclick=()=>{cm++;if(cm>11){cm=0;cy++}renderCal()}
  $('td-btn').onclick=()=>{const d=new Date();cm=d.getMonth();cy=d.getFullYear();renderCal()}
  $('b2c').onclick=backCal
  for(const p of['manha','tarde','noite'])$('tsk-'+p).parentElement.querySelector('.add-'+p).onclick=()=>addT(p)
  loadAll().then(()=>{renderCal();renderToday()})
}

async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession()
    if(session?.user){uid=session.user.id;renderApp()}
    else{const{data,error}=await sb.auth.signInAnonymously();if(error)throw error;uid=data.user.id;renderApp()}
  }catch(e){$('app').innerHTML='<div style="text-align:center;padding:40px;color:#ba1a1a"><h2>Erro</h2><p>'+e.message+'</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#b7006f;color:#fff;border:none;border-radius:8px;cursor:pointer">Tentar</button></div>'}
}
sb.auth.onAuthStateChange((e,session)=>{if(e==='SIGNED_IN'&&session?.user&&!uid){uid=session.user.id;renderApp()}})
init()
</script>
</body>
</html>
