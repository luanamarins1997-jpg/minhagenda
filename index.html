<html lang="pt-BR">
<head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Hanken+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500&family=Architects+Daughter&family=Caveat:wght@400;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Inter',sans-serif;background:#faf9fe;color:#1a1b1f;-webkit-user-select:none;user-select:none}
.material-symbols-outlined{font-variation-settings:'FILL'0,'wght'300,'GRAD'0,'opsz'24;vertical-align:middle}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.1);border-radius:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr}
.day-cell{border-right:1px solid #e5e5ea;border-bottom:1px solid #e5e5ea;padding:4px 6px;cursor:pointer;transition:all.15s;background:#fff;display:flex;flex-direction:column}
.day-cell:hover{background:rgba(4,89,197,0.03)}
.day-cell.other{opacity:0.3;background:#f5f4fa}
.day-cell.today{background:#eef4ff}
.day-num{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;flex-shrink:0}
.day-num.today{color:#0459c5;font-weight:700}
.cal-img{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:2px}
.cal-img img{max-height:100%;max-width:100%;object-fit:contain;border-radius:2px}
.sb{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:#f4f3f8;border-right:1px solid #c2c6d5;padding:16px 12px;overflow-y:auto}
.sb-btn{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:999px;font-size:14px;font-family:'Inter';border:none;cursor:pointer;transition:all.15s;width:100%;text-align:left;background:transparent;color:#424753}
.sb-btn:hover{background:#e9e7ed}
.sb-btn.live{background:#5891ff;color:#fff;font-weight:600}
.ov{position:fixed;inset:0;background:rgba(26,27,31,0.3);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.ov.on{display:flex}
.ov-c{background:#fff;border-radius:16px;width:100%;max-width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.12)}
.tk-r{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0eff5;min-height:40px}
.tk-c{width:18px;height:18px;border-radius:50%;border:2px solid #c2c6d5;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all.2s;color:transparent}
.tk-c.ck{background:#0459c5;border-color:#0459c5;color:#fff}
.tk-c.fl{background:#ba1a1a;border-color:#ba1a1a;color:#fff}
.tk-img{max-height:30px;width:100%;object-fit:contain;border-radius:2px}
.hand{font-family:'Architects Daughter',cursive}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1b1f;color:#fff;padding:10px 24px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity.3s;pointer-events:none}
#toast.on{opacity:1}
</style>
</head>

<script type="module">
import{createClient}from'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
const sb=createClient('https://pftjojkgzgthayfabhhf.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBmdGpvamtnemd0aGF5ZmFiaGhmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDE5MjcsImV4cCI6MjA5NjYxNzkyN30.CfqAZjKmiDexilbRMMRWl54-UZPVGz9Abu3tXpaQ0y4')
let uid=null,cm=(new Date).getMonth(),cy=(new Date).getFullYear(),alT=[],alC={},slD='',vM='month',ws=0
const $=id=>document.getElementById(id),to=m=>{const t=$('toast');if(!t)return;t.textContent=m;t.classList.add('on');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2000)}
const SN={pending:'done',done:'failed',failed:'pending'}
function ds(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function mn(m){return['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][m]}
async function loadAll(){
  if(!uid)return
  const[t,ce]=await Promise.all([sb.from('tasks').select('*').eq('user_id',uid).order('task_date'),sb.from('commitments').select('*').eq('user_id',uid)])
  if(!t.error&&t.data)alT=t.data;else alT=[]
  if(!ce.error&&ce.data){alC={};ce.data.forEach(c=>{alC[c.commit_date]=c.drawing})}
}
class HP{
  constructor(cn,op={}){
    this.c=cn;this.h=op.h||90;this._d=false;this.dpr=window.devicePixelRatio||1;this._lw=op.lw||2.5;this._er=false;this.ES=22
    this.wr=document.createElement('div');this.wr.style.cssText='position:relative;width:100%;background:#fcfdff;border-radius:6px;overflow:hidden'
    if(op.tb!==false){const tb=document.createElement('div');tb.style.cssText='display:flex;gap:2px;padding:2px 4px;border-bottom:1px solid #eee;background:#fafafa;align-items:center'
    const pb=this._tb('edit','Caneta',true),eb=this._tb('ink_eraser','Borracha',false);tb.appendChild(pb);tb.appendChild(eb)
    const sp=document.createElement('div');sp.style.cssText='flex:1';tb.appendChild(sp)
    const cl=this._tb('delete','Limpar',false);cl.onclick=()=>{if(this._d)this.clear()};tb.appendChild(cl);this.wr.appendChild(tb)}
    const cw=document.createElement('div');cw.style.cssText=`width:100%;height:${this.h}px`
    this.ca=document.createElement('canvas');this.ca.style.cssText='touch-action:none;cursor:crosshair;display:block;width:100%;height:100%;border-radius:6px'
    this.ctx=this.ca.getContext('2d');this._rs();this._dbg();cw.appendChild(this.ca);this.wr.appendChild(cw);cn.appendChild(this.wr)
    this._dr=false
    this.ca.addEventListener('pointerdown',e=>{e.preventDefault();this._dr=true;this._d=true;const x=e.offsetX*this.dpr,y=e.offsetY*this.dpr
      this.ctx.beginPath();this.ctx.moveTo(x,y);this.ctx.strokeStyle=this._er?'#fcfdff':'#1a1b1f';this.ctx.lineWidth=(this._er?this.ES:this._lw)*this.dpr
      this.ctx.lineCap='round';this.ctx.lineJoin='round';this._lx=x;this._ly=y})
    this.ca.addEventListener('pointermove',e=>{if(!this._dr)return;e.preventDefault();const x=e.offsetX*this.dpr,y=e.offsetY*this.dpr
      this.ctx.beginPath();this.ctx.moveTo(this._lx,this._ly);this.ctx.lineTo(x,y)
      this.ctx.strokeStyle=this._er?'#fcfdff':'#1a1b1f';this.ctx.lineWidth=(this._er?this.ES:this._lw)*this.dpr
      this.ctx.lineCap='round';this.ctx.lineJoin='round';this.ctx.stroke();this._lx=x;this._ly=y})
    this.ca.addEventListener('pointerup',()=>{this._dr=false});this.ca.addEventListener('pointerleave',()=>{this._dr=false})
  }
  _tb(ic,lb,ac){const b=document.createElement('button');b.type='button';b.innerHTML='<span class="material-symbols-outlined" style="font-size:14px">'+ic+'</span>';b.style.cssText=`display:flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:4px;border:none;cursor:pointer;background:${ac?'#0459c5':'transparent'};color:${ac?'#fff':'#666'}`;b.title=lb;return b}
  sm(m){this._er=m==='eraser';this.wr.querySelectorAll('button')[0].style.background=this._er?'transparent':'#0459c5';this.wr.querySelectorAll('button')[1].style.background=this._er?'#0459c5':'transparent'}
  _rs(){const r=this.c.getBoundingClientRect(),w=r.width||300;this.ca.width=w*this.dpr;this.ca.height=this.h*this.dpr}
  _dbg(){this.ctx.fillStyle='#fcfdff';this.ctx.fillRect(0,0,this.ca.width,this.ca.height);this.ctx.strokeStyle='#e2e7ff';this.ctx.lineWidth=1
    for(let y=16*this.dpr;y<this.ca.height;y+=16*this.dpr){this.ctx.beginPath();this.ctx.moveTo(0,y+.5);this.ctx.lineTo(this.ca.width,y+.5);this.ctx.stroke()}}
  toD(mw){if(!this._d)return'';mw=mw||400;const w=this.ca.width,h=this.ca.height;if(w<=mw*this.dpr)return this.ca.toDataURL('image/png')
    const s=(mw*this.dpr)/w,tw=Math.round(w*s),th=Math.round(h*s),tc=document.createElement('canvas');tc.width=tw;tc.height=th;tc.getContext('2d').drawImage(this.ca,0,0,tw,th);return tc.toDataURL('image/png')}
  clear(){this._d=false;this._dbg()}
  load(d){if(!d)return;this._d=true;const i=new Image();i.onload=()=>{this.ctx.drawImage(i,0,0,this.ca.width,this.ca.height)};i.src=d}
}
function renderCal(){
  $('cal-t').textContent=mn(cm)+' '+cy
  const fi=new Date(cy,cm,1).getDay(),da=new Date(cy,cm+1,0).getDate(),pd=new Date(cy,cm,0).getDate(),ho=new Date()
  let h=''
  for(let d=pd-fi+1;d<=pd;d++)h+='<div class="day-cell other"><span class="day-num">'+d+'</span></div>'
  for(let d=1;d<=da;d++){
    const eh=d===ho.getDate()&&cm===ho.getMonth()&&cy===ho.getFullYear(),sd=cy+'-'+String(cm+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')
    const co=alC[sd]||''
    h+='<div class="day-cell '+(eh?'today':'')+'" data-d="'+sd+'"><span class="day-num '+(eh?'today':'')+'">'+d+'</span>'+(co?'<div class="cal-img"><img src="'+co+'" draggable="false"></div>':'')+'</div>'
  }
  const to=fi+da,re=to%7===0?0:7-(to%7)
  for(let i=1;i<=re;i++)h+='<div class="day-cell other"><span class="day-num">'+i+'</span></div>'
  $('cal-g').innerHTML=h
  $('cal-g').querySelectorAll('.day-cell').forEach(el=>{el.addEventListener('click',()=>{slD=el.dataset.d;openOv(slD)})})
}
function renderHoje(){
  const c=$('hoje-l'),h=new Date(),hs=ds(h),we=['Domingo','Segunda','Terca','Quarta','Quinta','Sexta','Sabado']
  $('hoje-h').textContent=we[h.getDay()];$('hoje-d').textContent=String(h.getDate()).padStart(2,'0')
  $('hoje-m').textContent=mn(h.getMonth()).toUpperCase()+' '+h.getFullYear()
  const td=alT.filter(t=>t.task_date===hs)
  if(td.length===0){c.innerHTML='<div style="font-size:13px;color:#999;padding:8px 0;font-family:Architects Daughter">Nenhuma tarefa</div>';return}
  c.innerHTML=td.map(t=>'<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid #f0eff5">'+
    '<div style="width:12px;height:12px;border-radius:50%;border:1.5px solid #c2c6d5;flex-shrink:0;background:'+(t.status==='done'?'#0459c5':t.status==='failed'?'#ba1a1a':'transparent')+'">'+
    (t.status!=='pending'?'<span class="material-symbols-outlined" style="font-size:8px;color:#fff;display:flex;align-items:center;justify-content:center;width:12px;height:12px">'+(t.status==='done'?'check':'close')+'</span>':'')+'</div>'+
    (t.drawing?'<img src="'+t.drawing+'" style="max-height:20px;width:100%;object-fit:contain">':'<span style="font-size:12px;color:#333">'+(t.title||'')+'</span>')+'</div>').join('')
}
function renderWeek(){
  const sd=new Date(ws),meses=['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const dias=['DOM','SEG','TER','QUA','QUI','SEX','SAB'],hoje=new Date()
  $('cal-t').textContent=meses[sd.getMonth()]+' '+sd.getFullYear()
  let html=''
  for(let i=0;i<7;i++){
    const d=new Date(sd);d.setDate(d.getDate()+i)
    const eh=d.toDateString()===hoje.toDateString(),sd2=ds(d),co=alC[sd2]||'',ts=alT.filter(t=>t.task_date===sd2)
    html+='<div class="day-cell '+(eh?'today':'')+'" data-d="'+sd2+'" style="display:flex;flex-direction:column;padding:6px;border-right:'+(i<6?'1px solid #e5e5ea':'none')+'">'
    +'<div style="text-align:center;margin-bottom:4px"><div style="font-family:JetBrains Mono;font-size:10px;color:#5f5e5e">'+dias[i]+'</div>'
    +'<div style="font-family:Hanken Grotesk;font-size:22px;font-weight:700;color:'+(eh?'#0459c5':'#1a1b1f')+';line-height:1.2">'+d.getDate()+'</div></div>'
    // Commitment
    +(co?'<div style="flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:4px"><img src="'+co+'" style="max-height:60px;max-width:100%;object-fit:contain;border-radius:3px"></div>':'')
    // Tasks
    +ts.slice(0,2).map(t=>t.drawing?'<img src="'+t.drawing+'" style="max-height:20px;width:100%;object-fit:contain;margin-top:1px;border-radius:2px">':'<div style="font-size:11px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+((t.title)||'')+'</div>').join('')
    +(ts.length>2?'<div style="font-size:9px;color:#999;margin-top:2px">+'+(ts.length-2)+'</div>':'')
    +'</div>'
  }
  $('week-g').innerHTML=html
  $('week-g').querySelectorAll('.day-cell').forEach(el=>{el.addEventListener('click',()=>{slD=el.dataset.d;openOv(slD)})})
}
function openOv(d){
  slD=d;const dt=new Date(d.split('-')[0],+d.split('-')[1]-1,+d.split('-')[2]),w=['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado']
  $('ov-tit').textContent=w[dt.getDay()]+', '+dt.getDate();$('ov-sub').textContent=mn(dt.getMonth()).toUpperCase()+' '+dt.getFullYear()
  loadTsk(d);loadCmt();$('ov').classList.add('on')
}
function fcOv(){$('ov').classList.remove('on')}
async function loadTsk(d){
  if(!uid)return
  const{data,error}=await sb.from('tasks').select('*').eq('user_id',uid).eq('task_date',d).order('created_at')
  const ts=error||!data?[]:data
  const c=$('ov-ts')
  if(ts.length===0){c.innerHTML='<div style="text-align:center;padding:10px;color:#999;font-size:13px">Nenhuma tarefa</div>'}else{
    c.innerHTML=ts.map(t=>'<div class="tk-r"><div class="tk-c '+(t.status==='done'?'ck':t.status==='failed'?'fl':'')+'" data-id="'+t.id+'">'+(t.status==='done'?'check':t.status==='failed'?'close':'')+'</div>'+(t.drawing?'<img class="tk-img" src="'+t.drawing+'" draggable="false">':'<span style="font-size:13px;color:#333;flex:1">'+(t.title||'')+'</span>')+'<button class="dl-tk" data-id="'+t.id+'" style="background:none;border:none;cursor:pointer;color:#ba1a1a;padding:2px;font-size:13px;opacity:0.5;transition:opacity.2s">delete</button></div>').join('')
  }
  c.querySelectorAll('.tk-c').forEach(el=>{el.addEventListener('click',async e=>{e.stopPropagation();const ta=ts.find(x=>x.id===el.dataset.id);if(!ta)return;await sb.from('tasks').update({status:SN[ta.status]}).eq('id',el.dataset.id);await loadTsk(d)})})
  c.querySelectorAll('.dl-tk').forEach(el=>{el.addEventListener('click',async e=>{e.stopPropagation();await sb.from('tasks').delete().eq('id',el.dataset.id);await loadTsk(d);loadAll()})})
}

    const a=$('ov-ad'),f=document.createElement('div')

    +'<div id="month-v" style="display:flex;flex-direction:column;flex:1;overflow:hidden">'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);background:#f4f3f8;border-bottom:1px solid #e5e5ea">'
    +['DOM','SEG','TER','QUA','QUI','SEX','SAB'].map((d,i)=>'<div style="padding:6px 0;text-align:center;font-family:JetBrains Mono;font-size:10px;font-weight:500;color:'+(i===0?'#ba1a1a':'#5f5e5e')+'">'+d+'</div>').join('')+'</div>'
    +'<div id="cal-g" class="cal-grid" style="flex:1"></div></div>'
    // Week view
    +'<div id="week-v" style="display:none;flex-direction:column;flex:1">'
    +'<div id="week-g" style="display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:1fr;flex:1"></div></div>'
    +'</div></main></div>'
    // Overlay
    +'<div id="ov" class="ov"><div class="ov-c"><div style="padding:14px 18px;border-bottom:1px solid #e5e5ea;display:flex;justify-content:space-between;align-items:flex-start">'
    +'<div><h3 id="ov-tit" style="font-family:Hanken Grotesk;font-size:17px;font-weight:600;margin:0"></h3><p id="ov-sub" style="font-size:12px;color:#5f5e5e;margin:2px 0 0"></p></div>'
    +'<button onclick="fcOv()" style="background:none;border:none;cursor:pointer;color:#5f5e5e;padding:2px"><span class="material-symbols-outlined">close</span></button></div>'
    +'<div style="padding:10px 18px"><div style="font-family:JetBrains Mono;font-size:9px;color:#5f5e5e;letter-spacing:0.05em;margin-bottom:6px">TAREFAS</div><div id="ov-ts"></div>'
    +'<div id="ov-ad" style="margin-top:6px"><button id="ov-add" style="width:100%;padding:6px;border:1px dashed #c2c6d5;border-radius:6px;background:transparent;cursor:pointer;color:#5f5e5e;font-size:12px;display:flex;align-items:center;justify-content:center;gap:4px"><span class="material-symbols-outlined" style="font-size:14px">add</span> Nova tarefa</button></div></div>'
    // Commitment
    +'<div style="padding:10px 18px 16px;border-top:1px solid #f0eff5"><div style="font-family:JetBrains Mono;font-size:9px;color:#5f5e5e;letter-spacing:0.05em;margin-bottom:4px">COMPROMISSO</div>'
    +'<div id="ov-cm" style="margin-bottom:4px"></div>'
    +'<div style="display:flex;gap:6px;justify-content:flex-end"><button id="ov-cm-cl" style="padding:4px 12px;border:1px solid #c2c6d5;border-radius:6px;background:#fff;cursor:pointer;font-size:11px;color:#5f5e5e">Limpar</button>'
    +'<button id="ov-cm-sv" style="padding:4px 16px;background:#0459c5;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600">Salvar</button></div></div></div></div>'
    +'<div id="toast"></div></div>'

  // Week start = Monday of current week
  const now=new Date();const d=new Date(now);d.setDate(d.getDate()-((d.getDay()+6)%7));ws=ds(d);cm=now.getMonth();cy=now.getFullYear()
  $('pm').onclick=()=>{
    if(vM==='month'){cm--;if(cm<0){cm=11;cy--}renderCal()}
    else{const d=new Date(ws);d.setDate(d.getDate()-7);ws=ds(d);renderWeek()}}
  $('nm').onclick=()=>{
    if(vM==='month'){cm++;if(cm>11){cm=0;cy++}renderCal()}
    else{const d=new Date(ws);d.setDate(d.getDate()+7);ws=ds(d);renderWeek()}}
  $('tb').onclick=()=>{
    if(vM==='month'){const d=new Date();cm=d.getMonth();cy=d.getFullYear();renderCal()}
    else{const d=new Date();d.setDate(d.getDate()-((d.getDay()+6)%7));ws=ds(d);renderWeek()}}
  $('v-mes').onclick=()=>{vM='month';$('v-mes').style.cssText='padding:3px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;background:#fff;color:#0459c5';$('v-sem').style.cssText='padding:3px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:#5f5e5e';$('month-v').style.display='flex';$('week-v').style.display='none';renderCal()}
  $('v-sem').onclick=()=>{vM='week';$('v-sem').style.cssText='padding:3px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600;background:#fff;color:#0459c5';$('v-mes').style.cssText='padding:3px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:#5f5e5e';$('month-v').style.display='none';$('week-v').style.display='flex';renderWeek()}
  $('nv-tk').onclick=()=>{const d=ds(new Date());slD=d;openOv(d)}
  setupOv()
  loadAll().then(()=>{renderCal();renderHoje()})
}
async function init(){
  try{
    const{data:{session}}=await sb.auth.getSession()
    if(session?.user){uid=session.user.id;renderApp()}
    else{const{data,error}=await sb.auth.signInAnonymously();if(error)throw error;uid=data.user.id;renderApp()}
  }catch(e){$('app').innerHTML='<div style="text-align:center;padding:40px;color:#ba1a1a"><h2>Erro</h2><p>'+e.message+'</p></div>'}
}
sb.auth.onAuthStateChange((e,session)=>{if(e==='SIGNED_IN'&&session?.user&&!uid){uid=session.user.id;renderApp()}})
init()
</script>
</body>
</html>
