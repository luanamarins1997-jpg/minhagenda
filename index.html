// ===================== EVENTS =====================
async function loadEvents() {
  if (!userId) return
  const { data, error } = await supabase.from('events').select('*').eq('user_id', userId).order('start_date')
  if (!error && data) events = data
}

function renderCalendar() {
  const grid = $('calendar-grid')
  if (!grid) return
  const monthNames = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  $('month-title').textContent = `${monthNames[currentMonth]} ${currentYear}`

  const firstDay = new Date(currentYear, currentMonth, 1).getDay()
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate()
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate()
  const today = new Date()
  let html = ''

  const prevStart = daysInPrevMonth - firstDay + 1
  for (let d = prevStart; d <= daysInPrevMonth; d++) html += `<div class="calendar-day other-month"><span class="text-xs font-medium">${d}</span></div>`

  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const dayEvents = events.filter(e => e.start_date === dateStr)
    let evHtml = ''
    const colorMap = { default: '#b7006f', pessoal: '#0b6e00', trabalho: '#ba1a1a', saude: '#5a5f63' }
    const bgMap = { default: '#fdf2f8', pessoal: '#f0fdf4', trabalho: '#fef2f2', saude: '#f5f3f4' }
    dayEvents.slice(0, 3).forEach(e => {
      const c = colorMap[e.category] || '#b7006f'
      const b = bgMap[e.category] || '#fdf2f8'
      evHtml += `<div class="event-chip" style="color:${c};background:${b}">${e.title}</div>`
    })
    if (dayEvents.length > 3) evHtml += `<div class="text-xs text-[#727782] handwritten-text">+${dayEvents.length - 3} mais</div>`
    html += `<div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}"><span class="text-xs font-bold ${isToday ? 'text-[#b7006f]' : ''}">${d}</span>${evHtml}</div>`
  }

  const totalCells = firstDay + daysInMonth
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7)
  for (let i = 1; i <= remaining; i++) html += `<div class="calendar-day other-month"><span class="text-xs font-medium">${i}</span></div>`

  grid.innerHTML = html
  renderTodayAgenda()
}

function renderTodayAgenda() {
  const container = $('today-events')
  if (!container) return
  const today = new Date()
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`
  const weekdays = ['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado']
  if ($('today-date')) $('today-date').textContent = `${weekdays[today.getDay()]}, ${today.getDate()}/${today.getMonth()+1}`

  const dayEvents = events.filter(e => e.start_date === dateStr)
  if (dayEvents.length === 0) { container.innerHTML = '<p class="text-[#727782] text-sm" style="font-family:\'Patrick Hand\',cursive">Nenhum evento hoje ✨</p>'; return }

  container.innerHTML = dayEvents.map(e => `
    <div class="flex gap-3 group">
      <div class="flex flex-col items-center">
        <span class="handwritten-text font-bold text-sm" style="font-family:'Patrick Hand',cursive">${e.start_time ? e.start_time.slice(0,5) : '--:--'}</span>
        <div class="w-px flex-1 border-l border-dashed border-[#c2c6d2]/60 my-1"></div>
      </div>
      <div class="flex-1 p-2 -mt-1" style="transform:rotate(${Math.random() > 0.5 ? '-1deg' : '1deg'})">
        <p class="text-lg text-[#1b1c1d] leading-tight" style="font-family:'Gochi Hand',cursive">${e.title}</p>
        ${e.location ? `<p class="text-[#727782] text-sm" style="font-family:'Patrick Hand',cursive">${e.location}</p>` : ''}
        <div class="scribble-border w-full opacity-20 mt-1"></div>
        <button class="del-event text-[#ba1a1a] text-xs mt-1 opacity-0 group-hover:opacity-100 transition-opacity bg-transparent border-none cursor-pointer" style="font-family:'Patrick Hand',cursive" data-id="${e.id}">excluir</button>
      </div>
    </div>`).join('')

  container.querySelectorAll('.del-event').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Excluir este evento?')) return
      await supabase.from('events').delete().eq('id', btn.dataset.id)
      toast('Evento excluido')
      loadEvents().then(() => renderCalendar())
    }
  })
}

function setupEventForm() {
  if (!$('event-form')) return
  const today = new Date()
  if ($('ev-date')) $('ev-date').value = today.toISOString().split('T')[0]
  if ($('ev-time')) $('ev-time').value = '09:00'

  let selectedCat = 'default'
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('ring-2', 'ring-offset-2'); b.innerHTML = '' })
      btn.classList.add('ring-2', 'ring-offset-2')
      const colors = { default: 'ring-[#b7006f]', pessoal: 'ring-[#0b6e00]', trabalho: 'ring-[#ba1a1a]', saude: 'ring-[#5a5f63]' }
      btn.classList.add(colors[btn.dataset.cat] || 'ring-[#b7006f]')
      btn.innerHTML = '<span class="material-symbols-outlined text-white" style="font-size:18px">check</span>'
      selectedCat = btn.dataset.cat
    }
  })

  $('event-form').onsubmit = async (e) => {
    e.preventDefault()
    const title = $('ev-title').value.trim()
    if (!title) { toast('Digite um titulo'); return }
    const submitBtn = e.target.querySelector('button[type="submit"]')
    submitBtn.disabled = true; submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">sync</span> Salvando...'
    const { error } = await supabase.from('events').insert({
      user_id: userId, title,
      description: $('ev-desc').value,
      location: $('ev-location').value,
      start_date: $('ev-date').value,
      start_time: $('ev-time').value || null,
      category: selectedCat,
      reminder: $('ev-reminder').value
    })
    submitBtn.disabled = false; submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">save</span> Salvar Evento'
    if (error) { toast('Erro: ' + error.message); return }
    toast('Evento criado!')
    $('ev-title').value = ''; $('ev-desc').value = ''; $('ev-location').value = ''
    await loadEvents(); renderCalendar()
    showView('calendar-view'); $('view-title').textContent = 'Dashboard'
  }
}

// ===================== TASKS =====================
async function loadTasks() {
  if (!$('tasks-list') || !userId) return
  const { data, error } = await supabase.from('tasks').select('*').eq('user_id', userId).order('created_at', { ascending: false })
  if (error || !data) return
  tasks = data
  renderTasks()
}

function renderTasks() {
  const container = $('tasks-list')
  if (!container) return
  if (tasks.length === 0) { container.innerHTML = '<p class="text-[#727782] text-center py-8" style="font-family:\'Patrick Hand\',cursive;font-size:1.25rem">Nenhuma tarefa ainda ✨</p>'; return }
  container.innerHTML = tasks.map(t => {
    const pc = { normal: 'bg-[#dfe3e8] text-[#424751]', alta: 'bg-[#ffdad6] text-[#ba1a1a]', urgente: 'bg-[#ba1a1a] text-white' }
    return `
    <div class="paper-card p-4 rounded-lg flex items-center justify-between group ${t.completed ? 'opacity-60' : ''}">
      <div class="flex items-center gap-4">
        <div class="hand-drawn-checkbox ${t.completed ? 'checked' : ''}" data-id="${t.id}"></div>
        <div>
          <h4 class="text-lg ${t.completed ? 'line-through text-[#94a3b8]' : 'text-[#1b1c1d]'}" style="font-family:'Gochi Hand',cursive">${t.title}</h4>
          ${t.due_date ? `<p class="text-sm text-[#727782]" style="font-family:'Patrick Hand',cursive">${t.due_date}</p>` : ''}
        </div>
      </div>
      <div class="flex items-center gap-3">
        ${t.priority !== 'normal' ? `<span class="text-xs px-2 py-0.5 rounded-lg font-medium ${pc[t.priority] || pc.normal}">${t.priority}</span>` : ''}
        <button class="del-task text-[#ba1a1a] opacity-0 group-hover:opacity-100 transition-opacity bg-transparent border-none cursor-pointer" data-id="${t.id}"><span class="material-symbols-outlined" style="font-size:18px">delete</span></button>
      </div>
    </div>`
  }).join('')

  container.querySelectorAll('.hand-drawn-checkbox').forEach(cb => {
    cb.onclick = async () => {
      const task = tasks.find(t => t.id === cb.dataset.id)
      if (!task) return
      await supabase.from('tasks').update({ completed: !task.completed }).eq('id', cb.dataset.id)
      loadTasks()
    }
  })
  container.querySelectorAll('.del-task').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Excluir tarefa?')) return
      await supabase.from('tasks').delete().eq('id', btn.dataset.id)
      toast('Tarefa excluida')
      loadTasks()
    }
  })
}

function setupTasks() {
  if (!$('add-task-btn')) return
  $('add-task-btn').onclick = () => {
    const container = $('tasks-list')
    const form = document.createElement('div')
    form.className = 'bg-white rounded-xl shadow-sm border border-[#b7006f]/40 p-4 fade-in'
    const today = new Date().toISOString().split('T')[0]
    form.innerHTML = `
      <div class="handwriting-zone rounded-lg border border-[#c2c6d2]/40 h-12 flex items-center px-4 mb-3">
        <input id="new-task-input" class="w-full bg-transparent border-none text-lg" style="font-family:'Patrick Hand',cursive;outline:none" placeholder="Digite a tarefa...">
      </div>
      <div class="flex items-center gap-3 mb-3">
        <input id="new-task-date" type="date" value="${today}" class="flex-1 h-10 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-3 text-sm focus:ring-2 focus:ring-[#b7006f]">
        <select id="new-task-priority" class="h-10 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-3 text-sm focus:ring-2 focus:ring-[#b7006f]">
          <option value="normal">Normal</option>
          <option value="alta">Alta</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
      <div class="flex justify-end gap-2">
        <button id="new-task-cancel" class="px-4 py-1.5 text-sm rounded-lg text-[#727782] hover:bg-[#f5f3f4] bg-transparent border-none cursor-pointer">Cancelar</button>
        <button id="new-task-save" class="px-6 py-1.5 text-sm bg-[#b7006f] text-white rounded-lg font-semibold hover:opacity-90 border-none cursor-pointer">Salvar</button>
      </div>`
    container.prepend(form)
    const input = $('new-task-input'); if (input) input.focus()
    const cancel = $('new-task-cancel'); if (cancel) cancel.onclick = () => form.remove()
    const save = $('new-task-save')
    if (save) save.onclick = async () => {
      const input2 = $('new-task-input')
      const title = input2 ? input2.value.trim() : ''
      if (!title) { toast('Digite o titulo'); return }
      const { error } = await supabase.from('tasks').insert({
        user_id: userId, title,
        due_date: ($('new-task-date') || {}).value || null,
        priority: ($('new-task-priority') || {}).value || 'normal'
      })
      if (error) { toast('Erro: ' + error.message); return }
      toast('Tarefa criada!')
      form.remove(); loadTasks()
    }
  }
}

// ===================== INIT =====================
async function init() {
  try {
    const { data: { session } } = await supabase.auth.getSession()
    if (session?.user) {
      userId = session.user.id
      renderApp()
    } else {
      const { data, error } = await supabase.auth.signInAnonymously()
      if (error) throw error
      userId = data.user.id
      renderApp()
    }
  } catch(e) {
    $('app').innerHTML = '<div style="text-align:center;padding:40px;color:#ba1a1a"><h2>Erro ao conectar</h2><p>' + e.message + '</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#b7006f;color:white;border:none;border-radius:8px;cursor:pointer">Tentar novamente</button></div>'
  }
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user && !userId) {
    userId = session.user.id
    renderApp()
  }
})

init()
</script>
</body>
</html>
