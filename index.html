<style>

  .cal-cell {
    background:#fff; padding:4px 5px; cursor:pointer; border-radius:4px;
    transition:background 0.15s; position:relative; overflow:hidden;
  }
  .cal-cell:hover { background:#f0f0f2; }

  .cal-cell.other { opacity:0.3; }
  .cal-num { font-size:13px; font-weight:600; }
  .cal-num.today { color:#b7006f; }

  .day-view { max-width:640px; margin:0 auto; padding:16px; }
  .period-section { margin-bottom:24px; }
  .period-header {

    padding:8px 12px; border-radius:8px; margin-bottom:8px;
  }
  .period-header.manha { background:#fdf2f8; }
  .period-header.tarde { background:#fff7ed; }
  .period-header.noite { background:#eff6ff; }
  .period-title { font-size:15px; font-weight:700; letter-spacing:0.5px; }
  .period-title.manha { color:#b7006f; }
  .period-title.tarde { color:#e67e22; }
  .period-title.noite { color:#3b82f6; }

  .task-row {
    display:flex; align-items:center; gap:10px; padding:6px 12px; min-height:52px;
    border-bottom:1px solid #f0f0f2; transition:background 0.15s; cursor:pointer;
  }
  .task-row:last-child { border-bottom:none; }
  .task-row:hover { background:#fafafa; }
  .task-row.done { opacity:0.5; }
  .task-row.failed { opacity:0.6; }
  .task-row.failed .task-img { filter:grayscale(0.6); }

  .status-circle {
    width:28px; height:28px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:16px; font-weight:700; transition:all 0.2s;
    border:2px solid #ccc; cursor:pointer;
  }

  .status-circle.done { background:#22c55e; border-color:#22c55e; color:#fff; }
  .status-circle.failed { background:#ef4444; border-color:#ef4444; color:#fff; }

  .add-area { padding:8px 12px; }
  .add-pad-wrap { border:2px dashed #d1d5db; border-radius:8px; padding:4px; background:#fcfdff; margin-bottom:8px; }
  .add-actions { display:flex; gap:8px; justify-content:flex-end; }

  .back-btn {
    display:inline-flex; align-items:center; gap:4px; padding:6px 12px;
    background:transparent; border:none; cursor:pointer; font-size:14px; font-weight:500;
    color:#666; border-radius:8px; transition:background 0.15s;
  }
  .back-btn:hover { background:#e8e8ec; }

  .date-title { font-size:22px; font-weight:700; color:#1b1c1d; }
  .empty-state { text-align:center; padding:16px; color:#999; font-size:14px; }

  /* Canvas handwriting pad */
  .hpad { touch-action:none; cursor:crosshair; display:block; border-radius:6px; width:100%; }

  #toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#1b1c1d; color:#fff; padding:10px 20px; border-radius:10px;
    font-size:13px; z-index:999; opacity:0; transition:opacity 0.3s; pointer-events:none;
  }
  #toast.show { opacity:1; }

  @media (max-width:640px) {
    .cal-cell { padding:2px 3px; }
    .cal-num { font-size:11px; }
  }

// =============== HANDWRITING PAD ===============
class HandwritingPad {
  constructor(container, opts={}) {
    this.c = container; this.h = opts.h || 64; this._drawn = false
    this.dpr = window.devicePixelRatio || 1
    this._lineW = opts.lineW || 2.5
    this._eraser = false
    this._toolbar = opts.toolbar !== false
    this.ERASER_SIZE = 18

    this.wr = document.createElement('div')
    this.wr.style.cssText = `position:relative;width:100%;background:#fcfdff;border-radius:6px;overflow:hidden`

    // Toolbar
    if (this._toolbar) {
      this.tb = document.createElement('div')
      this.tb.style.cssText = 'display:flex;gap:4px;padding:4px 6px;border-bottom:1px solid #e5e7eb;background:#fafafa;align-items:center'
      this._penBtn = this._tbBtn('edit', 'Caneta', true)
      this._eraserBtn = this._tbBtn('auto_fix_high', 'Borracha', false)
      this.tb.appendChild(this._penBtn)
      this.tb.appendChild(this._eraserBtn)
      this._penBtn.onclick = () => this.setMode('pen')
      this._eraserBtn.onclick = () => this.setMode('eraser')

      const spacer = document.createElement('div')
      spacer.style.cssText = 'flex:1'
      this.tb.appendChild(spacer)

      this._clearBtn = this._tbBtn('delete', 'Limpar', false)
      this._clearBtn.onclick = () => { if (this._drawn) { this.clear(); this._onChange() } }
      this.tb.appendChild(this._clearBtn)

      this.wr.appendChild(this.tb)
    }

    this.canvasWrap = document.createElement('div')
    this.canvasWrap.style.cssText = `width:100%;height:${this.h}px;position:relative`
    this.ca = document.createElement('canvas'); this.ca.className = 'hpad'
    this.ctx = this.ca.getContext('2d')
    this._resize()
    this._drawBg()
    this.canvasWrap.appendChild(this.ca)
    this.wr.appendChild(this.canvasWrap)
    container.appendChild(this.wr)

    this._drawing = false
    this.ca.addEventListener('pointerdown', e => this._s(e))
    this.ca.addEventListener('pointermove', e => this._m(e))
    this.ca.addEventListener('pointerup', e => this._e(e))
    this.ca.addEventListener('pointerleave', e => this._e(e))
    this.ca.addEventListener('pointercancel', e => this._e(e))
    this.ca.style.touchAction = 'none'
  }

  _tbBtn(icon, label, active) {
    const b = document.createElement('button')
    b.type = 'button'
    b.innerHTML = `<span class="material-symbols-outlined" style="font-size:18px">${icon}</span>`
    b.style.cssText = `display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;border:none;cursor:pointer;background:${active?'#b7006f':'transparent'};color:${active?'#fff':'#666'};transition:all 0.15s`
    b.title = label
    return b
  }

  setMode(mode) {
    this._eraser = mode === 'eraser'
    this._penBtn.style.background = this._eraser ? 'transparent' : '#b7006f'
    this._penBtn.style.color = this._eraser ? '#666' : '#fff'
    this._eraserBtn.style.background = this._eraser ? '#b7006f' : 'transparent'
    this._eraserBtn.style.color = this._eraser ? '#fff' : '#666'
    this.ca.style.cursor = this._eraser ? 'cell' : 'crosshair'
    this._onChange()
  }

  _onChange() {}

  _resize() {
    const r = this.c.getBoundingClientRect()
    const w = r.width || 600
    this.ca.width = w * this.dpr
    this.ca.height = this.h * this.dpr
    this.ca.style.height = this.h + 'px'
    this.w = w
  }
  _drawBg() {
    const ctx = this.ctx
    ctx.fillStyle = '#fcfdff'
    ctx.fillRect(0, 0, this.ca.width, this.ca.height)
    ctx.strokeStyle = '#e2e7ff'
    ctx.lineWidth = 1
    for (let y = 16 * this.dpr; y < this.ca.height; y += 16 * this.dpr) {
      ctx.beginPath()
      ctx.moveTo(0, y + 0.5)
      ctx.lineTo(this.ca.width, y + 0.5)
      ctx.stroke()
    }
  }
  _s(e) {
    e.preventDefault()
    this._drawing = true
    this._drawn = true
    const x = e.offsetX, y = e.offsetY
    const ctx = this.ctx
    ctx.beginPath()
    ctx.moveTo(x * this.dpr, y * this.dpr)
    if (this._eraser) {
      ctx.strokeStyle = '#fcfdff'
      ctx.lineWidth = this.ERASER_SIZE * this.dpr
    } else {
      ctx.strokeStyle = '#1b1c1d'
      ctx.lineWidth = this._lineW * this.dpr
    }
    ctx.lineCap = 'round'
    ctx.lineJoin = 'round'
    this._lastX = x; this._lastY = y
  }
  _m(e) {
    if (!this._drawing) return
    e.preventDefault()
    const x = e.offsetX, y = e.offsetY
    const ctx = this.ctx
    ctx.beginPath()
    ctx.moveTo(this._lastX * this.dpr, this._lastY * this.dpr)
    ctx.lineTo(x * this.dpr, y * this.dpr)
    if (this._eraser) {
      ctx.strokeStyle = '#fcfdff'
      ctx.lineWidth = this.ERASER_SIZE * this.dpr
    } else {
      ctx.strokeStyle = '#1b1c1d'
      ctx.lineWidth = this._lineW * this.dpr
    }
    ctx.lineCap = 'round'
    ctx.lineJoin = 'round'
    ctx.stroke()
    this._lastX = x; this._lastY = y
  }
  _e(e) { if (!this._drawing) return; this._drawing = false }
  _resize() {
    const r = this.c.getBoundingClientRect()
    this.ca.width = r.width * this.dpr
    this.ca.height = this.h * this.dpr
    this.ca.style.height = this.h + 'px'
    this.ca.style.width = r.width + 'px'
    this.w = r.width
  }
  toDataURL() { return this._drawn ? this.ca.toDataURL('image/png') : '' }
  clear() { this._drawn = false; this._drawBg() }
  load(d) {
    if (!d) return
    this._drawn = true
    const i = new Image()
    i.onload = () => { this.ctx.drawImage(i, 0, 0, this.ca.width, this.ca.height) }
    i.src = d
  }
  isEmpty() { return !this._drawn }
}

// =============== STATE HELPERS ===============
const STATUS_NEXT = { pending:'done', done:'failed', failed:'pending' }
const STATUS_ICON = { pending:'', done:'✓', failed:'✗' }
const PERIOD_ICON = { manha:'🌅', tarde:'☀️', noite:'🌙' }
const PERIOD_LABEL = { manha:'MANHA', tarde:'TARDE', noite:'NOITE' }
const PERIOD_COLOR = { manha:'#b7006f', tarde:'#e67e22', noite:'#3b82f6' }

function fmtDate(d) {
  const meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  const dias = ['Domingo','Segunda-feira','Terca-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado']
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`
}
function dateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
}

// =============== CALENDAR ===============
function renderCalendar() {
  const meses = ['Janeiro','Fevereiro','Marco','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  $('cal-title').textContent = `${meses[curMonth]} ${curYear}`

  const first = new Date(curYear, curMonth, 1).getDay()
  const days = new Date(curYear, curMonth+1, 0).getDate()
  const prevDays = new Date(curYear, curMonth, 0).getDate()
  const hoje = new Date()
  let html = ''

  for (let d=prevDays-first+1; d<=prevDays; d++) html += `<div class="cal-cell other"><div class="cal-num">${d}</div></div>`

  for (let d=1; d<=days; d++) {
    const ehHoje = d===hoje.getDate() && curMonth===hoje.getMonth() && curYear===hoje.getFullYear()
    const ds = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const td = allTasks.filter(t => t.task_date === ds)
    const tem = { manha: td.some(t=>t.period==='manha'), tarde: td.some(t=>t.period==='tarde'), noite: td.some(t=>t.period==='noite') }
    const compromisso = allCommitments[ds]
    html += `<div class="cal-cell ${ehHoje?'today':''}" data-date="${ds}">
      <div class="cal-num ${ehHoje?'today':''}">${d}</div>
      ${compromisso ? `<img src="${compromisso}" style="max-height:28px;width:auto;display:block;margin-top:1px;border-radius:2px;border:1px solid #e0e0e2">` : ''}
      ${td.slice(0,2).map(t => t.drawing ? `<img src="${t.drawing}" style="max-height:14px;width:auto;display:block;margin-top:1px;border-radius:1px">` : `<span style="font-size:9px;color:#555;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">${t.title||''}</span>`).join('')}
      ${td.length > 2 ? `<span style="font-size:9px;color:#999">+${td.length-2}</span>` : ''}
    </div>`
  }

  const total = first + days
  const rest = total%7===0 ? 0 : 7-(total%7)
  for (let i=1; i<=rest; i++) html += `<div class="cal-cell other"><div class="cal-num">${i}</div></div>`

  const grid = $('cal-grid')
  grid.innerHTML = html

  // Celulas quadradas: altura = largura real de cada coluna
  const cellW = Math.floor(grid.querySelector('.cal-cell').offsetWidth)
  if (cellW > 60) grid.querySelectorAll('.cal-cell').forEach(el => { el.style.height = cellW + 'px' })

  grid.querySelectorAll('.cal-cell').forEach(el => {
    el.addEventListener('click', () => {
      selectedDate = el.dataset.date
      showDayView(selectedDate)
    })
  })
}

// =============== TODAY TASKS (Main Screen) ===============
function renderTodayTasks() {
  const container = $('today-tasks')
  if (!container) return
  const hoje = new Date()
  const ds = dateStr(hoje)
  const tarefas = allTasks.filter(t => t.task_date === ds)

  if (tarefas.length === 0) {
    container.innerHTML = `<div class="empty-state">Nenhuma tarefa hoje ✨</div>`
    return
  }

  container.innerHTML = ['manha','tarde','noite'].map(p => {
    const lista = tarefas.filter(t => t.period === p)
    if (lista.length === 0) return ''
    return `
      <div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:700;color:${PERIOD_COLOR[p]};margin-bottom:2px;padding:0 4px">${PERIOD_ICON[p]} ${PERIOD_LABEL[p]}</div>
        ${lista.map(t => `
          <div class="task-row ${t.status}" style="cursor:default;padding:3px 6px;min-height:30px;border-radius:4px" data-id="${t.id}">
            <div class="status-circle ${t.status}" style="width:18px;height:18px;font-size:10px;border-width:1.5px" data-id="${t.id}">${STATUS_ICON[t.status]}</div>
            <div style="flex:1;min-width:0">
              ${t.drawing ? `<img class="task-img" src="${t.drawing}" style="max-height:18px">` : `<span style="font-size:11px;color:#333">${t.title || ''}</span>`}
            </div>
          </div>
        `).join('')}
      </div>`
  }).join('')

  container.querySelectorAll('.status-circle').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation()
      const task = allTasks.find(t => t.id === el.dataset.id)
      if (!task) return
      const next = STATUS_NEXT[task.status]
      await supabase.from('tasks').update({ status: next }).eq('id', el.dataset.id)
      await loadAll(); renderCalendar(); renderTodayTasks()
    })
  })
}

// =============== DAY VIEW ===============
async function showDayView(date) {
  selectedDate = date
  $('view-title').textContent = 'Dia'
  $('calendar-view').style.display = 'none'
  $('day-view-wrap').style.display = 'flex'
  requestAnimationFrame(() => loadDayTasks(date))
}

function backToCalendar() {
  $('day-view-wrap').style.display = 'none'
  $('calendar-view').style.display = 'flex'
  $('view-title').textContent = 'Agenda'
  loadAll().then(() => { renderCalendar(); renderTodayTasks() })
}

async function loadDayTasks(date) {
  const partes = date.split('-')
  const dt = new Date(+partes[0], +partes[1]-1, +partes[2])
  $('day-date').textContent = fmtDate(dt)

  if (!userId) return
  const { data, error } = await supabase.from('tasks').select('*')
    .eq('user_id', userId).eq('task_date', date).order('created_at')
  if (!error && data) dayTasks = data; else dayTasks = []
  loadCommitForDay(date)

  for (const p of ['manha','tarde','noite']) {
    const container = $(`tasks-${p}`)
    const lista = dayTasks.filter(t => t.period === p)
    if (lista.length === 0) {
      container.innerHTML = `<div class="empty-state">Nenhuma tarefa</div>`
    } else {
      container.innerHTML = lista.map(t => `
        <div class="task-row ${t.status}" data-id="${t.id}">
          <div class="status-circle ${t.status}" data-id="${t.id}">${STATUS_ICON[t.status]}</div>
          <div style="flex:1;min-width:0">
            ${t.drawing ? `<img class="task-img" src="${t.drawing}" draggable="false" style="max-height:32px">` : `<span style="font-size:14px;color:#333">${t.title || '(sem tarefa)'}</span>`}
          </div>
          <div style="display:flex;gap:4px;flex-shrink:0">
            <button class="edit-task-btn" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:#666;padding:4px;border-radius:4px;font-size:14px" title="Editar">✏️</button>
            <button class="del-task-btn" data-id="${t.id}" style="background:none;border:none;cursor:pointer;color:#ba1a1a;padding:4px;border-radius:4px;font-size:14px" title="Excluir">🗑️</button>
          </div>
        </div>
      `).join('')
    }
    // Status toggle
    container.querySelectorAll('.status-circle').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation()
        const id = el.dataset.id
        const task = dayTasks.find(t => t.id === id)
        if (!task) return
        const next = STATUS_NEXT[task.status]
        await supabase.from('tasks').update({ status: next }).eq('id', id)
        await loadDayTasks(date)
      })
    })
    // Edit
    container.querySelectorAll('.edit-task-btn').forEach(el => {
      el.addEventListener('click', (e) => { e.stopPropagation(); editTask(el.dataset.id, date) })
    })
    // Delete
    container.querySelectorAll('.del-task-btn').forEach(el => {
      el.addEventListener('click', (e) => { e.stopPropagation(); deleteTask(el.dataset.id, date) })
    })
  }
}

// =============== ADD TASK (per period) ===============
function setupAddTask(period) {
  const btn = $(`add-btn-${period}`)
  if (!btn) return
  btn.onclick = () => {
    const container = $(`tasks-${period}`)
    if ($('inline-task-pad')) return
    const wrap = document.createElement('div')
    wrap.id = 'inline-task-pad'
    wrap.style.cssText = 'border:1px solid #d0d0d2;border-radius:6px;margin:4px;padding:4px;background:#fff'
    const padDiv = document.createElement('div')
    padDiv.style.cssText = 'height:60px'
    wrap.appendChild(padDiv)
    const actions = document.createElement('div')
    actions.style.cssText = 'display:flex;gap:4px;justify-content:flex-end;margin-top:4px'
    actions.innerHTML = `<button class="task-cancel" style="padding:4px 10px;border:none;border-radius:4px;cursor:pointer;font-size:11px;color:#666;background:#f0f0f2">Cancelar</button><button class="task-save" style="padding:4px 12px;background:#b7006f;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600">Salvar</button>`
    wrap.appendChild(actions)
    if (container.querySelector('.empty-state')) container.innerHTML = ''
    container.prepend(wrap)

    const pad = new HandwritingPad(padDiv, { h: 60, clearable: true })
    wrap.querySelector('.task-cancel').onclick = () => wrap.remove()
    wrap.querySelector('.task-save').onclick = async () => {
      const drawing = pad.toDataURL()
      if (!drawing) { toast('Escreva algo'); return }
      await supabase.from('tasks').insert({ user_id: userId, task_date: selectedDate, period, drawing, title: '', status: 'pending' })
      toast('Tarefa adicionada!')
      wrap.remove()
      await loadDayTasks(selectedDate)
    }
  }
}

// =============== COMPROMISSO ===============
let commitPad = null

function setupDayPad() {
  if (!$('commit-save')) return
  // Sera criado quando o dia for aberto (lazy)
}

function initCommitPad() {
  if (commitPad) return
  commitPad = new HandwritingPad($('commit-pad'), { h: 100, clearable: true, toolbar: false })

  $('commit-save').onclick = async () => {
    const drawing = commitPad.toDataURL()
    if (!drawing) { toast('Escreva o compromisso com a caneta'); return }
    const { error } = await supabase.from('commitments').upsert({
      user_id: userId, commit_date: selectedDate, drawing
    }, { onConflict: 'commit_date' })
    if (error) { toast('Erro: '+error.message); return }
    toast('Compromisso salvo!')
    commitPad.clear()
    await loadAll()
    renderCalendar()
    renderTodayTasks()
    await loadDayTasks(selectedDate)
    loadCommitForDay(selectedDate)
  }

  $('commit-clear').onclick = async () => {
    commitPad.clear()
    await supabase.from('commitments').delete().eq('user_id', userId).eq('commit_date', selectedDate)
    delete allCommitments[selectedDate]
    renderCalendar()
    loadCommitForDay(selectedDate)
  }
}

async function loadCommitForDay(date) {
  if (!commitPad) { initCommitPad(); await new Promise(r => setTimeout(r, 50)) }
  commitPad.clear()
  const drawing = allCommitments[date]
  if (drawing) commitPad.load(drawing)
}

// =============== EDIT / DELETE TASK ===============
async function editTask(id, date, fromHome) {
  const task = (fromHome ? allTasks : dayTasks).find(t => t.id === id)
  if (!task) return
  const container = fromHome ? $('today-tasks') : $(`tasks-${task.period}`)
  if ($('inline-pad')) return

  const wrap = document.createElement('div')
  wrap.id = 'inline-pad'
  wrap.className = 'add-area'
  wrap.style.cssText = 'border:2px solid #b7006f;border-radius:8px;margin:4px 0;background:#fff;overflow:hidden'

  const header = document.createElement('div')
  header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:4px 8px;background:#fafafa;border-bottom:1px solid #e5e7eb;font-size:12px;font-weight:600;color:#b7006f'
  header.textContent = `${PERIOD_ICON[task.period]} Editando tarefa`
  wrap.appendChild(header)

  const body = document.createElement('div')
  body.style.cssText = 'padding:6px'
  const padDiv = document.createElement('div')
  padDiv.id = 'pad-inline-edit'
  body.appendChild(padDiv)

  const actions = document.createElement('div')
  actions.style.cssText = 'display:flex;gap:8px;justify-content:flex-end;padding:6px'
  const cancelBtn = document.createElement('button')
  cancelBtn.textContent = 'Cancelar'
  cancelBtn.style.cssText = 'padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#666;background:#f0f0f2'
  const saveBtn = document.createElement('button')
  saveBtn.textContent = 'Salvar'
  saveBtn.style.cssText = 'padding:6px 16px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:#fff;background:#b7006f'
  actions.appendChild(cancelBtn)
  actions.appendChild(saveBtn)
  body.appendChild(actions)
  wrap.appendChild(body)

  container.prepend(wrap)
  const pad = new HandwritingPad(padDiv, { h: 140, clearable: true })
  if (task.drawing) pad.load(task.drawing)

  cancelBtn.onclick = () => wrap.remove()
  saveBtn.onclick = async () => {
    const drawing = pad.toDataURL()
    if (!drawing) { toast('Escreva algo ou cancele'); return }
    await supabase.from('tasks').update({ drawing }).eq('id', id)
    toast('Tarefa atualizada!')
    wrap.remove()
    if (fromHome) { await loadAll(); renderCalendar(); renderTodayTasks() }
    else await loadDayTasks(date)
  }
}

async function deleteTask(id, date, fromHome) {
  if (!confirm('Excluir esta tarefa?')) return
  await supabase.from('tasks').delete().eq('id', id)
  toast('Tarefa excluida')
  if (fromHome) { await loadAll(); renderCalendar(); renderTodayTasks() }
  else await loadDayTasks(date)
}

// =============== RENDER APP ===============
function renderApp() {
  $('app').innerHTML = `
    <div id="app-screen" style="width:100%;max-width:100%;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#fff">
      <header style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #f0f0f2;flex-shrink:0;background:#fff">
        <h1 id="view-title" style="font-size:18px;font-weight:700;color:#b7006f;margin:0">Agenda</h1>
        <span style="font-size:13px;color:#999">Escrita Manual</span>
      </header>

      <!-- CALENDAR VIEW -->
      <div id="calendar-view" style="flex:1;display:flex;overflow:hidden">
        <!-- Calendar main (left) -->
        <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#fff;border-bottom:1px solid #f0f0f2">
            <div style="display:flex;align-items:center;gap:6px">
              <button id="prev-month" class="back-btn" style="padding:4px 6px"><span class="material-symbols-outlined">chevron_left</span></button>
              <span id="cal-title" style="font-size:15px;font-weight:600;min-width:150px;text-align:center"></span>
              <button id="next-month" class="back-btn" style="padding:4px 6px"><span class="material-symbols-outlined">chevron_right</span></button>
            </div>
            <button id="today-btn" class="back-btn" style="font-size:12px">Hoje</button>
          </div>
          <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:2px 6px;background:#fafafa;border-bottom:1px solid #f0f0f2">
            ${['Dom','Seg','Ter','Qua','Qui','Sex','Sab'].map(d => `<div style="text-align:center;font-size:10px;font-weight:600;color:#999;padding:3px 0">${d}</div>`).join('')}
          </div>
          <div id="cal-grid" class="cal-grid" style="flex:1;padding:3px 6px 6px;overflow-y:auto"></div>
        </div>
        <!-- Today tasks panel (right) -->
        <div style="width:180px;flex-shrink:0;display:flex;flex-direction:column;border-left:1px solid #f0f0f2;background:#fafafa">
          <div style="padding:10px 10px 6px;border-bottom:1px solid #f0f0f2">
            <span style="font-size:13px;font-weight:700;color:#b7006f">Hoje</span>
          </div>
          <div id="today-tasks" style="flex:1;overflow-y:auto;padding:3px 6px 12px">
            <div class="empty-state">Carregando...</div>
          </div>
        </div>
      </div>

      <!-- DAY VIEW -->
      <div id="day-view-wrap" style="flex:1;display:none;flex-direction:column;overflow:hidden">
        <div style="display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #f0f0f2;background:#fafafa">
          <button id="back-to-cal" class="back-btn"><span class="material-symbols-outlined" style="font-size:20px">arrow_back</span> Voltar</button>
          <span id="day-date" class="date-title" style="font-size:17px;font-weight:600"></span>
        </div>
        <div style="flex:1;overflow-y:auto;padding:4px 0" class="day-view">
          ${['manha','tarde','noite'].map(p => `
            <div class="period-section">
              <div class="period-header ${p}">
                <span class="period-title ${p}">${PERIOD_ICON[p]} ${PERIOD_LABEL[p]}</span>
                <button id="add-btn-${p}" class="back-btn" style="font-size:13px;font-weight:600;color:${PERIOD_COLOR[p]}">
                  <span class="material-symbols-outlined" style="font-size:18px">add</span> Escrever
                </button>
              </div>
              <div id="tasks-${p}"><div class="empty-state">Nenhuma tarefa</div></div>
            </div>
          `).join('')}
        </div>
        <!-- Compromisso area fixed at bottom -->
        <div style="border-top:1px solid #e0e0e2;background:#fff;padding:8px 12px 12px;flex-shrink:0">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            <span style="font-size:13px;font-weight:700;color:#1b1c1d">📌 Compromisso</span>
            <button id="commit-clear" class="back-btn" style="font-size:11px;color:#999">Limpar</button>
          </div>
          <div id="commit-pad" style="margin-bottom:6px"></div>
          <div style="display:flex;gap:6px;align-items:center;justify-content:flex-end">
            <button id="commit-save" style="padding:7px 20px;background:#b7006f;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">Salvar Compromisso</button>
          </div>
        </div>
      </div>

      <div id="toast"></div>
    </div>`

  // Navigation
  $('prev-month').onclick = () => { curMonth--; if(curMonth<0){curMonth=11;curYear--} renderCalendar() }
  $('next-month').onclick = () => { curMonth++; if(curMonth>11){curMonth=0;curYear++} renderCalendar() }
  $('today-btn').onclick = () => { const d=new Date(); curMonth=d.getMonth(); curYear=d.getFullYear(); renderCalendar() }
  $('back-to-cal').onclick = backToCalendar

  for (const p of ['manha','tarde','noite']) setupAddTask(p)
  setupDayPad()

  loadAll().then(() => { renderCalendar(); renderTodayTasks() })
}

async function loadAll() {
  if (!userId) return
  const { data, error } = await supabase.from('tasks').select('*').eq('user_id', userId).order('task_date')
  if (!error && data) allTasks = data; else allTasks = []
  const { data: cd, error: ce } = await supabase.from('commitments').select('*').eq('user_id', userId)
  if (!ce && cd) { allCommitments = {}; cd.forEach(c => { allCommitments[c.commit_date] = c.drawing }) }
}

// =============== INIT ===============
async function init() {
  try {
    const { data: { session } } = await supabase.auth.getSession()
    if (session?.user) { userId = session.user.id; renderApp() }
    else {
      const { data, error } = await supabase.auth.signInAnonymously()
      if (error) throw error; userId = data.user.id; renderApp()
    }
  } catch(e) {
    $('app').innerHTML = `<div style="text-align:center;padding:40px;color:#ba1a1a"><h2>Erro</h2><p>${e.message}</p><button onclick="location.reload()" style="margin-top:16px;padding:12px 24px;background:#b7006f;color:#fff;border:none;border-radius:8px;cursor:pointer">Tentar</button></div>`
  }
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event==='SIGNED_IN' && session?.user && !userId) { userId = session.user.id; renderApp() }
})

init()
</script>
</body>
