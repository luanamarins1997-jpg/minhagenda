function $(id) { return document.getElementById(id) }

function toast(msg) {
  const t = $('toast')
  t.textContent = msg; t.classList.add('show')
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2500)
}

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'))
  $(id).classList.add('active')
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
  const navMap = { 'calendar-view': 'nav-dashboard', 'event-view': 'nav-event', 'tasks-view': 'nav-tasks' }
  const navId = navMap[id]
  if (navId) $(navId).classList.add('active')
}

// ===================== AUTH =====================
function renderAuth() {
  $('app').innerHTML = `
    <div id="auth-screen" class="flex items-center justify-center bg-[#faf9fa]" style="min-height:100vh">
      <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
          <h1 class="font-headline-md text-4xl font-bold text-[#b7006f] handwritten-title">Minha Agenda</h1>
          <p class="text-[#424751] mt-2 handwritten-text text-xl">Elevated Planner</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-[#c2c6d2]/30 p-8">
          <div id="auth-form">
            <h2 class="text-xl font-bold text-[#1b1c1d] mb-6" id="auth-title">Entrar</h2>
            <div class="space-y-4">
              <div>
                <label class="text-sm font-medium text-[#424751]">Email</label>
                <input id="auth-email" type="email" class="w-full h-12 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-4 text-[#1b1c1d] focus:ring-2 focus:ring-[#b7006f] focus:border-transparent" placeholder="seu@email.com">
              </div>
              <div>
                <label class="text-sm font-medium text-[#424751]">Senha</label>
                <input id="auth-password" type="password" class="w-full h-12 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-4 text-[#1b1c1d] focus:ring-2 focus:ring-[#b7006f] focus:border-transparent" placeholder="••••••••">
              </div>
              <button id="auth-btn" class="w-full h-12 bg-[#b7006f] text-white rounded-lg font-semibold hover:opacity-90 transition-all active:scale-[0.98] shadow-md">Entrar</button>
              <p class="text-sm text-center text-[#727782]">
                <span id="auth-toggle-text">Não tem conta?</span>
                <button id="auth-toggle" class="text-[#b7006f] font-semibold hover:underline ml-1">Criar conta</button>
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>`

  let isLogin = true
  const toggle = () => {
    isLogin = !isLogin
    $('auth-title').textContent = isLogin ? 'Entrar' : 'Criar Conta'
    $('auth-btn').textContent = isLogin ? 'Entrar' : 'Criar Conta'
    $('auth-toggle-text').textContent = isLogin ? 'Não tem conta?' : 'Já tem conta?'
    $('auth-toggle').textContent = isLogin ? 'Criar conta' : 'Entrar'
  }
  $('auth-toggle').onclick = toggle

  $('auth-btn').onclick = async () => {
    const email = $('auth-email').value.trim()
    const password = $('auth-password').value.trim()
    if (!email || !password) { toast('Preencha email e senha'); return }
    $('auth-btn').disabled = true; $('auth-btn').textContent = 'Aguarde...'
    try {
      let result
      if (isLogin) {
        result = await supabase.auth.signInWithPassword({ email, password })
      } else {
        result = await supabase.auth.signUp({ email, password })
      }
      if (result.error) { toast(result.error.message); $('auth-btn').disabled = false; $('auth-btn').textContent = isLogin ? 'Entrar' : 'Criar Conta'; return }
      if (!isLogin) { toast('Conta criada! Verifique seu email.'); isLogin = true; toggle() }
    } catch(e) { toast('Erro de conexão'); }
    $('auth-btn').disabled = false; $('auth-btn').textContent = isLogin ? 'Entrar' : 'Criar Conta'
  }
}

                  <p class="text-sm text-[#727782]">Minha Agenda v1.0 • Feito com Supabase</p>

              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- Toast -->
      <div id="toast"></div>
    </div>`

  // Setup navigation
  $('nav-dashboard').onclick = () => { showView('calendar-view'); $('view-title').textContent = 'Dashboard' }
  $('nav-tasks').onclick = () => { showView('tasks-view'); $('view-title').textContent = 'Tarefas'; loadTasks() }
  $('nav-settings').onclick = () => { showView('settings-view'); $('view-title').textContent = 'Config' }
  $('nav-event').onclick = () => { showView('event-view'); $('view-title').textContent = 'Novo Evento'; setupEventForm() }
  $('ev-cancel').onclick = () => { showView('calendar-view'); $('view-title').textContent = 'Dashboard' }
  for (const id of ['btn-logout', 'btn-logout2']) {
    $(id).onclick = async () => { await supabase.auth.signOut(); init() }
  }

  // Calendar navigation
  $('prev-month').onclick = () => { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear-- } renderCalendar() }
  $('next-month').onclick = () => { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++ } renderCalendar() }
  $('today-btn').onclick = () => { const d = new Date(); currentMonth = d.getMonth(); currentYear = d.getFullYear(); renderCalendar() }

  // Load data and render
  loadEvents()
  renderCalendar()
  setupEventForm()
  setupTasks()
}

// ===================== EVENTS =====================
async function loadEvents() {
  if (!currentUser) return
  const { data, error } = await supabase.from('events').select('*').eq('user_id', currentUser.id).order('start_date')
  if (!error && data) events = data
}

async function renderCalendar() {
  if (!$('calendar-grid')) return
  const grid = $('calendar-grid')
  const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro']
  $('month-title').textContent = `${monthNames[currentMonth]} ${currentYear}`

  const firstDay = new Date(currentYear, currentMonth, 1).getDay()
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate()
  const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate()
  const today = new Date()

  grid.innerHTML = ''

  // Previous month days
  const prevStart = daysInPrevMonth - firstDay + 1
  for (let d = prevStart; d <= daysInPrevMonth; d++) {
    grid.innerHTML += `<div class="calendar-day other-month"><span class="text-xs font-medium">${d}</span></div>`
  }

  // Current month days
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = d === today.getDate() && currentMonth === today.getMonth() && currentYear === today.getFullYear()
    const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
    const dayEvents = events.filter(e => e.start_date === dateStr)

    let eventsHtml = ''
    dayEvents.slice(0, 3).forEach(e => {
      const colorMap = { default: '#b7006f', pessoal: '#0b6e00', trabalho: '#ba1a1a', saude: '#5a5f63' }
      const bgMap = { default: '#fdf2f8', pessoal: '#f0fdf4', trabalho: '#fef2f2', saude: '#f5f3f4' }
      const color = colorMap[e.category] || '#b7006f'
      const bg = bgMap[e.category] || '#fdf2f8'
      eventsHtml += `<div class="event-chip-handwritten" style="color:${color};background:${bg}">${e.title}</div>`
    })
    if (dayEvents.length > 3) eventsHtml += `<div class="text-xs text-[#727782] handwritten-text">+${dayEvents.length - 3} mais</div>`

    grid.innerHTML += `<div class="calendar-day ${isToday ? 'today' : ''}" data-date="${dateStr}">
      <span class="text-xs font-bold ${isToday ? 'text-[#b7006f]' : ''}">${d}</span>
      ${eventsHtml}
    </div>`
  }

  // Fill remaining cells
  const totalCells = firstDay + daysInMonth
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7)
  for (let i = 1; i <= remaining; i++) {
    grid.innerHTML += `<div class="calendar-day other-month"><span class="text-xs font-medium">${i}</span></div>`
  }

  renderTodayAgenda()
}

function renderTodayAgenda() {
  if (!$('today-events')) return
  const today = new Date()
  const dateStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`
  const weekdays = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado']
  $('today-date').textContent = `${weekdays[today.getDay()]}, ${today.getDate()}/${today.getMonth()+1}`

  const dayEvents = events.filter(e => e.start_date === dateStr)
  const container = $('today-events')

  if (dayEvents.length === 0) {
    container.innerHTML = '<p class="text-[#727782] text-sm handwritten-text text-lg">Nenhum evento hoje ✨</p>'
    return
  }

  container.innerHTML = dayEvents.map(e => `
    <div class="flex gap-3 group">
      <div class="flex flex-col items-center">
        <span class="handwritten-text font-bold text-sm">${e.start_time ? e.start_time.slice(0,5) : '--:--'}</span>
        <div class="w-px flex-1 border-l border-dashed border-[#c2c6d2]/60 my-1"></div>
      </div>
      <div class="flex-1 p-2 -mt-1 transform ${Math.random() > 0.5 ? '-rotate-1' : 'rotate-1'}">
        <p class="handwritten-title text-lg text-[#1b1c1d] leading-tight">${e.title}</p>
        ${e.location ? `<p class="handwritten-text text-[#727782] text-sm">${e.location}</p>` : ''}
        <div class="scribble-border w-full opacity-20 mt-1"></div>
        <button class="del-event text-[#ba1a1a] text-xs handwritten-text mt-1 opacity-0 group-hover:opacity-100 transition-opacity" data-id="${e.id}">excluir</button>
      </div>
    </div>
  `).join('')

  container.querySelectorAll('.del-event').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Excluir este evento?')) return
      await supabase.from('events').delete().eq('id', btn.dataset.id)
      toast('Evento excluído')
      loadEvents(); renderCalendar()
    }
  })
}

function setupEventForm() {
  if (!$('event-form')) return
  const today = new Date()
  $('ev-date').value = today.toISOString().split('T')[0]
  $('ev-time').value = '09:00'

  let selectedCat = 'default'
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.cat-btn').forEach(b => { b.classList.remove('ring-2', 'ring-offset-2'); b.innerHTML = '' })
      btn.classList.add('ring-2', 'ring-offset-2')
      const colors = { default: 'ring-[#b7006f]', pessoal: 'ring-[#0b6e00]', trabalho: 'ring-[#ba1a1a]', saude: 'ring-[#5a5f63]' }
      btn.classList.add(colors[btn.dataset.cat] || 'ring-[#b7006f]')
      btn.innerHTML = '<span class="material-symbols-outlined text-white" style="font-size:18px">check</span>'
      selectedCat = btn.dataset.cat
    }
  })

  $('event-form').onsubmit = async (e) => {
    e.preventDefault()
    const title = $('ev-title').value.trim()
    if (!title) { toast('Digite um título'); return }

    const submitBtn = e.target.querySelector('button[type="submit"]')
    submitBtn.disabled = true; submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">sync</span> Salvando...'

    const { error } = await supabase.from('events').insert({
      user_id: currentUser.id,
      title,
      description: $('ev-desc').value,
      location: $('ev-location').value,
      start_date: $('ev-date').value,
      start_time: $('ev-time').value || null,
      category: selectedCat,
      reminder: $('ev-reminder').value
    })

    submitBtn.disabled = false; submitBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size:18px">save</span> Salvar Evento'

    if (error) { toast('Erro: ' + error.message); return }
    toast('Evento criado!')
    $('ev-title').value = ''; $('ev-desc').value = ''; $('ev-location').value = ''
    loadEvents(); renderCalendar()
    showView('calendar-view'); $('view-title').textContent = 'Dashboard'
  }
}

// ===================== TASKS =====================
async function loadTasks() {
  if (!$('tasks-list') || !currentUser) return
  const { data, error } = await supabase.from('tasks').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false })
  if (error || !data) return
  tasks = data
  renderTasks()
}

function renderTasks() {
  const container = $('tasks-list')
  if (!container) return
  if (tasks.length === 0) {
    container.innerHTML = '<p class="text-[#727782] text-center py-8 handwritten-text text-xl">Nenhuma tarefa ainda ✨</p>'
    return
  }
  container.innerHTML = tasks.map(t => {
    const priorityColors = { normal: 'bg-[#dfe3e8] text-[#424751]', alta: 'bg-[#ffdad6] text-[#ba1a1a]', urgente: 'bg-[#ba1a1a] text-white' }
    const pColor = priorityColors[t.priority] || priorityColors.normal
    return `
    <div class="paper-card p-4 rounded-lg flex items-center justify-between group ${t.completed ? 'opacity-60' : ''}">
      <div class="flex items-center gap-4">
        <div class="hand-drawn-checkbox ${t.completed ? 'checked' : ''}" data-id="${t.id}"></div>
        <div>
          <h4 class="handwritten-text text-lg ${t.completed ? 'line-through text-[#94a3b8]' : 'text-[#1b1c1d]'}">${t.title}</h4>
          ${t.due_date ? `<p class="handwritten-sub text-sm text-[#727782]">${t.due_date}</p>` : ''}
        </div>
      </div>
      <div class="flex items-center gap-3">
        ${t.priority !== 'normal' ? `<span class="text-xs px-2 py-0.5 rounded-lg font-medium ${pColor}">${t.priority}</span>` : ''}
        <button class="del-task text-[#ba1a1a] opacity-0 group-hover:opacity-100 transition-opacity" data-id="${t.id}">
          <span class="material-symbols-outlined" style="font-size:18px">delete</span>
        </button>
      </div>
    </div>`
  }).join('')

  container.querySelectorAll('.hand-drawn-checkbox').forEach(cb => {
    cb.onclick = async () => {
      const id = cb.dataset.id
      const task = tasks.find(t => t.id === id)
      if (!task) return
      const { error } = await supabase.from('tasks').update({ completed: !task.completed }).eq('id', id)
      if (!error) { loadTasks(); loadEvents() }
    }
  })
  container.querySelectorAll('.del-task').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Excluir tarefa?')) return
      await supabase.from('tasks').delete().eq('id', btn.dataset.id)
      toast('Tarefa excluída')
      loadTasks()
    }
  })
}

function setupTasks() {
  if (!$('add-task-btn')) return
  $('add-task-btn').onclick = () => {
    const container = $('tasks-list')
    const form = document.createElement('div')
    form.className = 'bg-white rounded-xl shadow-sm border border-[#b7006f]/40 p-4 fade-in'
    const today = new Date().toISOString().split('T')[0]
    form.innerHTML = `
      <div class="handwriting-zone rounded-lg border border-[#c2c6d2]/40 h-12 flex items-center px-4 mb-3">
        <input id="new-task-input" class="w-full bg-transparent border-none focus:ring-0 text-lg handwritten-text" placeholder="Digite a tarefa...">
      </div>
      <div class="flex items-center gap-3 mb-3">
        <input id="new-task-date" type="date" value="${today}" class="flex-1 h-10 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-3 text-sm focus:ring-2 focus:ring-[#b7006f]">
        <select id="new-task-priority" class="h-10 bg-[#f5f3f4] border border-[#c2c6d2] rounded-lg px-3 text-sm focus:ring-2 focus:ring-[#b7006f]">
          <option value="normal">Normal</option>
          <option value="alta">Alta</option>
          <option value="urgente">Urgente</option>
        </select>
      </div>
      <div class="flex justify-end gap-2">
        <button id="new-task-cancel" class="px-4 py-1.5 text-sm rounded-lg text-[#727782] hover:bg-[#f5f3f4]">Cancelar</button>
        <button id="new-task-save" class="px-6 py-1.5 text-sm bg-[#b7006f] text-white rounded-lg font-semibold hover:opacity-90">Salvar</button>
      </div>
    `
    container.prepend(form)
    $('new-task-input').focus()

    $('new-task-cancel').onclick = () => form.remove()
    $('new-task-save').onclick = async () => {
      const title = $('new-task-input').value.trim()
      if (!title) { toast('Digite o título'); return }
      const { error } = await supabase.from('tasks').insert({
        user_id: currentUser.id, title,
        due_date: $('new-task-date').value || null,
        priority: $('new-task-priority').value
      })
      if (error) { toast('Erro: ' + error.message); return }
      toast('Tarefa criada!')
      form.remove()
      loadTasks()
    }
  }
}

// ===================== INIT =====================
async function init() {
  const { data: { session } } = await supabase.auth.getSession()
  if (session?.user) {
    renderApp(session.user)
  } else {
    renderAuth()
  }
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session?.user) renderApp(session.user)
  else if (event === 'SIGNED_OUT') init()
})

init()
</script>
</body>
</html>
