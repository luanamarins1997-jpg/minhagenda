<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Agenda">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#007AFF">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon.svg">
  <title>Agenda</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="app-header">
      <div class="header-left">
        <button id="btn-menu" class="btn-icon" aria-label="Menu">&#9776;</button>
        <h1 id="header-title">Agenda</h1>
      </div>
      <div class="header-right">
        <button id="btn-today" class="btn-text">Hoje</button>
        <button id="btn-theme" class="btn-icon" aria-label="Alternar tema">&#9790;</button>
      </div>
    </header>

    <section id="view-calendar">
      <div class="month-nav">
        <button id="btn-prev-month" class="btn-icon">&#9664;</button>
        <h2 id="month-title">Junho 2026</h2>
        <button id="btn-next-month" class="btn-icon">&#9654;</button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
      <div class="day-section" id="day-section">
        <div class="day-section-header">
          <h3 id="day-label">Hoje</h3>
          <button id="btn-new-event" class="btn-primary">+ Novo Evento</button>
        </div>
        <div class="day-events" id="day-events"></div>
      </div>
    </section>

    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal-container">
        <section id="view-event-form" class="modal-content">
          <div class="modal-header">
            <button id="btn-form-back" class="btn-icon">&#9664;</button>
            <h2 id="form-title">Novo Evento</h2>
            <div class="spacer"></div>
          </div>
          <div class="modal-body">
            <div class="field-group">
              <label class="field-label">Título</label>
              <div class="ink-canvas-wrap">
                <canvas id="canvas-title" class="ink-canvas" data-height="60"></canvas>
              </div>
              <div class="ink-toolbar" id="toolbar-title">
                <button class="ink-color-btn" data-color="#1C1C1E" style="background:#1C1C1E" aria-label="Preto"></button>
                <button class="ink-color-btn active" data-color="#007AFF" style="background:#007AFF" aria-label="Azul"></button>
                <button class="ink-color-btn" data-color="#FF3B30" style="background:#FF3B30" aria-label="Vermelho"></button>
                <button class="ink-color-btn" data-color="#34C759" style="background:#34C759" aria-label="Verde"></button>
                <span class="toolbar-sep"></span>
                <button class="ink-size-btn active" data-size="3" aria-label="Fino">―</button>
                <button class="ink-size-btn" data-size="6" aria-label="Médio">━</button>
                <button class="ink-size-btn" data-size="10" aria-label="Grosso">━━</button>
                <span class="toolbar-sep"></span>
                <button class="ink-undo-btn" aria-label="Desfazer">↩</button>
                <button class="ink-eraser-btn" aria-label="Borracha">⊘</button>
                <button class="ink-clear-btn" aria-label="Limpar">✕</button>
              </div>
            </div>

            <div class="field-row">
              <div class="field">
                <label class="field-label">Data</label>
                <input type="date" id="event-date" class="field-input">
              </div>
              <div class="field">
                <label class="field-label">Hora</label>
                <input type="time" id="event-time" class="field-input">
              </div>
            </div>

            <div class="field-group">
              <label class="field-label">Categoria</label>
              <div class="category-selector" id="category-selector"></div>
            </div>

            <div class="field-group">
              <label class="field-label">Repetir</label>
              <div class="recurrence-selector" id="recurrence-selector"></div>
            </div>

            <div class="field-group">
              <label class="field-label">Observações</label>
              <div class="ink-canvas-wrap tall">
                <canvas id="canvas-notes" class="ink-canvas" data-height="150"></canvas>
              </div>
              <div class="ink-toolbar" id="toolbar-notes">
                <button class="ink-color-btn" data-color="#1C1C1E" style="background:#1C1C1E" aria-label="Preto"></button>
                <button class="ink-color-btn active" data-color="#007AFF" style="background:#007AFF" aria-label="Azul"></button>
                <button class="ink-color-btn" data-color="#FF3B30" style="background:#FF3B30" aria-label="Vermelho"></button>
                <button class="ink-color-btn" data-color="#34C759" style="background:#34C759" aria-label="Verde"></button>
                <span class="toolbar-sep"></span>
                <button class="ink-size-btn active" data-size="3" aria-label="Fino">―</button>
                <button class="ink-size-btn" data-size="6" aria-label="Médio">━</button>
                <button class="ink-size-btn" data-size="10" aria-label="Grosso">━━</button>
                <span class="toolbar-sep"></span>
                <button class="ink-undo-btn" aria-label="Desfazer">↩</button>
                <button class="ink-eraser-btn" aria-label="Borracha">⊘</button>
                <button class="ink-clear-btn" aria-label="Limpar">✕</button>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button id="btn-save" class="btn-primary btn-large">Salvar Evento</button>
            <button id="btn-delete-event" class="btn-danger btn-large hidden">Excluir Evento</button>
          </div>
        </section>

        <section id="view-event-detail" class="modal-content">
          <div class="modal-header">
            <button id="btn-detail-back" class="btn-icon">&#9664;</button>
            <h2>Evento</h2>
            <div class="spacer"></div>
          </div>
          <div class="modal-body">
            <div class="detail-category-badge" id="detail-category-badge"></div>
            <div class="ink-canvas-wrap">
              <canvas id="detail-title-canvas" class="ink-canvas" data-height="60"></canvas>
            </div>
            <div class="detail-info">
              <p id="detail-date" class="detail-row">&#128197;</p>
              <p id="detail-time" class="detail-row">&#9200;</p>
              <p id="detail-recurrence" class="detail-row">&#128257;</p>
            </div>
            <label class="field-label">Observações</label>
            <div class="ink-canvas-wrap tall">
              <canvas id="detail-notes-canvas" class="ink-canvas" data-height="200"></canvas>
            </div>
          </div>
          <div class="modal-footer">
            <button id="btn-edit-event" class="btn-primary btn-large">Editar</button>
            <button id="btn-share-event" class="btn-secondary btn-large">Compartilhar</button>
            <button id="btn-export-event" class="btn-secondary btn-large">Exportar</button>
            <button id="btn-delete-from-detail" class="btn-danger btn-large">Excluir</button>
          </div>
        </section>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/ink.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/events.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
